tests:
  - description: codex mini | Create a Mermaid-driven sequence spike with palette
      discipline and rendered proof artifacts.
    vars:
      taskPrompt: "Create a new spike at `spikes/eval-mermaid-sequence-left-to-right`.
        The spike must include `README.md` and an executable `main.py`. Render
        `videos/eval-mermaid-sequence-left-to-right/eval-mermaid-sequence-left-\
        to-right.webm` and
        `videos/eval-mermaid-sequence-left-to-right/eval-mermaid-sequence-left-\
        to-right.png`. Extract at least one proof frame into
        `videos/eval-mermaid-sequence-left-to-right/review-frames/`. Append a
        section titled `## Eval Mermaid Sequence Left To Right` to
        `.specs/knowledge/gjv1-manim-video-quality.md`. Use the project primary
        palette, keep text near zero, use a white review background, and animate
        this Mermaid sequence idea so the request visibly travels from left to
        right and the response returns: `sequenceDiagram; participant Alice;
        participant Bob; Alice->>Bob: Request; Bob->>Alice: Response`. Return
        only a brief completion note after the files are written."
      variantId: codex-mini
      variantDisplayName: codex mini
    metadata:
      benchmarkId: gjv1-manim-compare-generated
      promptId: mermaid-left-right-spike
      promptDescription: Create a Mermaid-driven sequence spike with palette
        discipline and rendered proof artifacts.
      variantId: codex-mini
      variantDisplayName: codex mini
      rowId: codex-mini:mermaid-left-right-spike
      label_variantId: codex-mini
      label_variantDisplayName: codex mini
    assert:
      - type: llm-rubric
        value: "Score 1.0 only if the agent follows the repository workflow for
          high-quality Manim video iteration: it creates or refines the
          requested spikes, keeps text minimal, uses the project palette,
          renders real video artifacts, produces proof frames, and updates the
          reusable knowledge note with concise experiment-specific learnings."
        provider:
          id: C:\Users\villa\dev\skill-arena\src\providers\local-judge-provider.js
          config:
            provider_id: skill-arena:judge:codex
            adapter: codex
            working_directory: C:\Users\villa\AppData\Local\Temp\skill-arena-execution-5zirF9\workspace
      - type: javascript
        value: >
          const fs = process.getBuiltinModule("node:fs");

          const path = process.getBuiltinModule("node:path");

          return fs.existsSync(path.resolve(process.cwd(),
          ".specs/knowledge/gjv1-manim-video-quality.md"));
      - type: javascript
        value: >-
          const fs = process.getBuiltinModule('node:fs');

          const path = process.getBuiltinModule('node:path');

          const workspaceDirectory =
          context?.providerResponse?.metadata?.workspaceDirectory ??
          context?.providerResponse?.metadata?.workingDirectory;

          if (!workspaceDirectory) {
            throw new Error('Missing provider workspaceDirectory in assertion context.');
          }

          try {
            const fileContents = fs.readFileSync(path.resolve(workspaceDirectory, "spikes/eval-mermaid-sequence-left-to-right/README.md"), 'utf8');
            return fileContents.includes("Eval Mermaid Sequence Left To Right");
          } catch (error) {
            if (error?.code === 'ENOENT') {
              return false;
            }
            throw error;
          }
      - type: javascript
        value: >-
          const fs = process.getBuiltinModule('node:fs');

          const path = process.getBuiltinModule('node:path');

          const workspaceDirectory =
          context?.providerResponse?.metadata?.workspaceDirectory ??
          context?.providerResponse?.metadata?.workingDirectory;

          if (!workspaceDirectory) {
            throw new Error('Missing provider workspaceDirectory in assertion context.');
          }

          try {
            const fileContents = fs.readFileSync(path.resolve(workspaceDirectory, "spikes/eval-mermaid-sequence-left-to-right/main.py"), 'utf8');
            return fileContents.includes("PRIMARY_GREEN");
          } catch (error) {
            if (error?.code === 'ENOENT') {
              return false;
            }
            throw error;
          }
      - type: javascript
        value: >-
          const fs = process.getBuiltinModule('node:fs');

          const path = process.getBuiltinModule('node:path');

          const workspaceDirectory =
          context?.providerResponse?.metadata?.workspaceDirectory ??
