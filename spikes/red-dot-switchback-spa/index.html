<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Switchback SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot switchback visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot switchback narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests several turning grammars, compresses inside a tight
              switchback pocket, then resolves into a compact centered route that holds without explanatory text.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="78%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="812" cy="448" rx="710" ry="316" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1108" cy="252" rx="228" ry="144" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="470" cy="654" rx="296" ry="176" fill="#ffffff" opacity="0.4" />

            <g id="layout-root">
              <rect x="108" y="110" width="1384" height="680" fill="#ffffff" opacity="0.56" />
              <rect x="142" y="180" width="1316" height="540" fill="url(#plate-fade)" opacity="0.94" />
              <rect x="198" y="220" width="1204" height="460" fill="#ffffff" opacity="0.18" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 214 252 H 1386" />
                <path d="M 214 450 H 1386" />
                <path d="M 214 648 H 1386" />
                <path d="M 370 220 V 680" />
                <path d="M 800 220 V 680" />
                <path d="M 1230 220 V 680" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 316 450 C 450 450, 592 450, 736 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 316 450 C 450 450, 592 450, 736 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 566 450 C 612 426, 650 406, 680 394"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 680 394 C 742 352, 792 328, 852 336"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 852 336 C 930 346, 982 374, 1010 402"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-step" opacity="0">
                  <path
                    d="M -54 44 V -8 H 40"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M -14 -8 H 14" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-elbow" opacity="0">
                  <path
                    d="M -56 50 V -24 H 24 V 24"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle cx="24" cy="-24" r="8" fill="#9e1b32" />
                </g>

                <g id="candidate-switch" opacity="0">
                  <path
                    d="M -66 56 V -28 H 62 V 18 H -12 V 56"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M 26 -28 H 54" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                  <path d="M -12 20 H 16" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <path
                  id="corridor-guide"
                  d="M 724 566 V 336 Q 724 308 752 308 H 940 Q 968 308 968 336 V 422 Q 968 450 940 450 H 786 Q 758 450 758 478 V 566"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="center-guide"
                  d="M 758 450 H 934"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <circle id="pressure-halo" cx="842" cy="450" r="132" fill="url(#halo-gradient)" opacity="0" />

                <g id="gate-left" opacity="0">
                  <rect x="-22" y="-92" width="44" height="184" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="gate-top" opacity="0">
                  <rect x="-96" y="-20" width="192" height="40" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="gate-right" opacity="0">
                  <rect x="-22" y="-80" width="44" height="160" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="gate-mid" opacity="0">
                  <rect x="-84" y="-18" width="168" height="36" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>

                <path
                  id="switch-shell"
                  d="M 724 566 V 336 Q 724 308 752 308 H 940 Q 968 308 968 336 V 422 Q 968 450 940 450 H 786 Q 758 450 758 478 V 566"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <path
                  id="switch-base"
                  d="M 724 566 V 336 Q 724 308 752 308 H 940 Q 968 308 968 336 V 422 Q 968 450 940 450 H 786 Q 758 450 758 478 V 566"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="switch-trace"
                  d="M 724 566 V 336 Q 724 308 752 308 H 940 Q 968 308 968 336 V 422 Q 968 450 940 450 H 786 Q 758 450 758 478 V 566"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 2400"
                  opacity="0"
                />
                <path
                  id="inner-base"
                  d="M 770 566 V 492 Q 770 470 792 470 H 930 Q 952 470 952 448 V 344 Q 952 326 932 326 H 782"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="inner-trace"
                  d="M 770 566 V 492 Q 770 470 792 470 H 930 Q 952 470 952 448 V 344 Q 952 326 932 326 H 782"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 1600"
                  opacity="0"
                />

                <g id="turn-slot-top" opacity="0">
                  <path d="M -34 -34 H 10 M -34 -34 V 12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 18 -34 H 44 M 44 -34 V -8" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="turn-slot-mid" opacity="0">
                  <path d="M -40 -12 H -10 M -40 -12 V 24" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 10 24 H 42 M 42 24 V -10" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <path
                  id="anchor-grid"
                  d="M 846 278 V 336 M 724 450 H 758 M 934 450 H 970 M 758 566 H 818"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  opacity="0"
                />
                <circle id="resolution-halo" cx="846" cy="450" r="174" fill="url(#halo-gradient)" opacity="0" />
                <path
                  id="resolution-frame"
                  d="M 682 286 H 732 V 336
                     M 1008 286 H 958 V 336
                     M 682 614 H 732 V 564
                     M 1008 614 H 958 V 564"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0"
                />

                <circle id="dot-halo" cx="316" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="316" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
