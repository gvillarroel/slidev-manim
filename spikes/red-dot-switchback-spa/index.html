<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Switchback SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot switchback visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot switchback narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests several turning grammars, gets compressed inside a narrow
              elbow, then resolves into a calm centered switchback route.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f1f1f1" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.99" />
                <stop offset="80%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.9" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.2" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="16%" stop-color="#ffffff" stop-opacity="0.96" />
                <stop offset="84%" stop-color="#ffffff" stop-opacity="0.96" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="806" cy="448" rx="720" ry="320" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1096" cy="250" rx="224" ry="154" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="452" cy="650" rx="284" ry="168" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect x="108" y="110" width="1384" height="680" fill="#ffffff" opacity="0.56" />
              <rect x="142" y="180" width="1316" height="540" fill="url(#plate-fade)" opacity="0.94" />
              <rect x="200" y="220" width="1200" height="460" fill="#ffffff" opacity="0.16" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 218 252 H 1382" />
                <path d="M 218 450 H 1382" />
                <path d="M 218 648 H 1382" />
                <path d="M 370 220 V 680" />
                <path d="M 800 220 V 680" />
                <path d="M 1230 220 V 680" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 520 462 C 590 462, 670 462, 786 462"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 520 462 C 590 462, 670 462, 786 462"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 720 462 C 740 434, 748 410, 756 392"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 756 392 C 818 426, 866 458, 908 500"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 908 500 C 954 478, 1002 436, 1052 400"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-shallow" opacity="0">
                  <path
                    d="M -64 50 H 46 V -38"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M -18 14 H 14" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-switch" opacity="0">
                  <path
                    d="M -70 50 H 48 V -6 H -2 V -62"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M -20 -4 H 12" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-tall" opacity="0">
                  <path
                    d="M -62 50 H 26 V -12 H 74"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M -10 -10 H 18" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <path
                  id="turn-guide"
                  d="M 820 456 H 928 V 536 H 718 V 372 H 820 V 456"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="gate-guide"
                  d="M 812 456 H 900 V 512 H 740 V 390 H 812 V 456"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <circle id="pressure-halo" cx="820" cy="448" r="124" fill="url(#halo-gradient)" opacity="0" />

                <path
                  id="gate-shell"
                  d="M 820 456 H 928 V 536 H 718 V 372 H 820 V 456"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <path
                  id="gate-left"
                  d="M 820 456 H 928"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="gate-vertical-a"
                  d="M 928 456 V 536"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="gate-middle"
                  d="M 928 536 H 718"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="gate-vertical-b"
                  d="M 718 536 V 372"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="gate-top"
                  d="M 718 372 H 820"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />

                <path
                  id="switchback-base"
                  d="M 820 456 H 940 V 548 H 700 V 364 H 820 V 456"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="switchback-trace"
                  d="M 820 456 H 940 V 548 H 700 V 364 H 820 V 456"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 2200"
                  opacity="0"
                />

                <g id="slot-center" opacity="0">
                  <path d="M -32 -14 H -8 M -32 -14 V 18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 8 18 H 32 M 32 18 V -14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-bottom-right" opacity="0">
                  <path d="M -32 -14 H -8 M -32 -14 V 18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 8 18 H 32 M 32 18 V -14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-bottom-left" opacity="0">
                  <path d="M -32 -16 H -8 M -32 -16 V 16" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 8 16 H 32 M 32 16 V -16" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-top-left" opacity="0">
                  <path d="M -32 -16 H -8 M -32 -16 V 16" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 8 16 H 32 M 32 16 V -16" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-top-center" opacity="0">
                  <path d="M -32 -18 H -8 M -32 -18 V 14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 8 14 H 32 M 32 14 V -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-top-right" opacity="0">
                  <path d="M -32 -18 H -8 M -32 -18 V 14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 8 14 H 32 M 32 14 V -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <path
                  id="shelf-bottom"
                  d="M 940 548 H 700"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="riser-right"
                  d="M 940 456 V 548"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="shelf-middle"
                  d="M 820 456 H 940"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="riser-left"
                  d="M 700 548 V 364"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="shelf-top"
                  d="M 700 364 H 820"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="riser-center"
                  d="M 820 364 V 456"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />

                <g id="resolution-frame" opacity="0" stroke="#cfcfcf" stroke-width="3.5" stroke-linecap="round">
                  <path d="M 666 316 H 724 M 666 316 V 374" fill="none" />
                  <path d="M 974 316 H 916 M 974 316 V 374" fill="none" />
                  <path d="M 666 596 H 724 M 666 596 V 538" fill="none" />
                  <path d="M 974 596 H 916 M 974 596 V 538" fill="none" />
                </g>
                <circle id="resolution-halo" cx="820" cy="456" r="152" fill="url(#halo-gradient)" opacity="0" />

                <circle id="dot-halo" cx="292" cy="462" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="292" cy="462" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <p id="phase-label" class="sr-only" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
