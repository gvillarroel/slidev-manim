<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Resonance SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot resonance visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot resonance narrative</title>
            <desc id="stage-desc">
              A single red point appears, tests three incomplete forms, compresses through a narrow slot,
              activates a field of four anchors, and resolves as one centered connected system.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f1f1f1" />
              </linearGradient>
              <linearGradient id="panel-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="16%" stop-color="#ffffff" stop-opacity="0.86" />
                <stop offset="84%" stop-color="#ffffff" stop-opacity="0.86" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="50%" r="44%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="72%" stop-color="#ffffff" stop-opacity="0.26" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.84" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.05" />
              </filter>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="794" cy="446" rx="684" ry="294" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1128" cy="454" rx="274" ry="214" fill="#ffccd5" opacity="0.16" />
            <rect
              x="96"
              y="110"
              width="1408"
              height="680"
              fill="#ffffff"
              opacity="0.64"
              stroke="#e7e7e7"
              stroke-width="1.5"
              filter="url(#soft-shadow)"
            />
            <rect x="124" y="176" width="1352" height="546" fill="url(#panel-fade)" opacity="0.9" />
            <rect x="172" y="212" width="1256" height="476" fill="#ffffff" opacity="0.22" />

            <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
              <path d="M 188 232 H 1412" />
              <path d="M 188 450 H 1412" />
              <path d="M 188 668 H 1412" />
              <path d="M 340 210 V 690" />
              <path d="M 820 210 V 690" />
              <path d="M 1260 210 V 690" />
            </g>

            <g id="scene-root">
              <path
                id="narrative-spine"
                d="M 340 450 C 420 434, 470 362, 510 292 C 574 316, 622 376, 664 430 C 628 506, 592 558, 544 606 C 648 552, 712 500, 760 470 C 818 470, 840 470, 860 470 C 910 470, 934 470, 958 470 C 992 420, 1020 344, 1060 286 C 1130 322, 1186 386, 1236 450 C 1188 514, 1128 572, 1060 614 C 996 588, 936 536, 890 450 C 944 448, 1010 448, 1060 450 C 996 450, 920 450, 820 450"
                fill="none"
                stroke="#d8d8d8"
                stroke-width="4"
                stroke-linecap="round"
                stroke-dasharray="6 14"
                opacity="0"
              />
              <path
                id="active-trail"
                d="M 340 450 C 420 434, 470 362, 510 292 C 574 316, 622 376, 664 430 C 628 506, 592 558, 544 606 C 648 552, 712 500, 760 470 C 818 470, 840 470, 860 470 C 910 470, 934 470, 958 470 C 992 420, 1020 344, 1060 286 C 1130 322, 1186 386, 1236 450 C 1188 514, 1128 572, 1060 614 C 996 588, 936 536, 890 450 C 944 448, 1010 448, 1060 450 C 996 450, 920 450, 820 450"
                fill="none"
                stroke="#9e1b32"
                stroke-width="9"
                stroke-linecap="round"
                stroke-dasharray="0 2200"
                opacity="0"
              />

              <g id="search-group">
                <circle id="search-ring" cx="510" cy="292" r="56" fill="none" stroke="#b5b5b5" stroke-width="5" opacity="0" />
                <rect id="search-frame" x="606" y="372" width="116" height="116" fill="none" stroke="#b5b5b5" stroke-width="5" opacity="0" />
                <path
                  id="search-arch"
                  d="M 478 646 V 614 C 478 572 508 544 544 544 C 580 544 610 572 610 614 V 646"
                  fill="none"
                  stroke="#b5b5b5"
                  stroke-width="5"
                  stroke-linecap="square"
                  opacity="0"
                />
                <circle id="search-echo-a" cx="510" cy="292" r="9" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-b" cx="664" cy="430" r="9" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-c" cx="544" cy="606" r="9" fill="#9e1b32" opacity="0" />
                <path id="search-guide-a" d="M 340 450 C 410 426, 458 350, 510 292" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-guide-b" d="M 510 292 C 580 316, 622 374, 664 430" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-guide-c" d="M 664 430 C 628 508, 590 560, 544 606" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
              </g>

              <g id="tension-group" opacity="0">
                <rect id="shutter-top" x="728" y="216" width="302" height="156" fill="#333e48" opacity="0.92" />
                <rect id="shutter-bottom" x="728" y="568" width="302" height="156" fill="#333e48" opacity="0.92" />
                <rect id="aperture-frame" x="812" y="296" width="96" height="348" fill="none" stroke="#9c9c9c" stroke-width="3" opacity="0.58" />
                <path id="pull-left" d="M 652 470 H 816" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0.64" />
                <path id="pull-right" d="M 908 470 H 1068" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0.64" />
                <ellipse id="compression-field" cx="860" cy="470" rx="46" ry="28" fill="none" stroke="#ffccd5" stroke-width="5" opacity="0.22" />
              </g>

              <g id="system-rig">
                <g id="future-group" opacity="0">
                  <line id="base-line-top" x1="1060" y1="450" x2="1060" y2="286" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <line id="base-line-right" x1="1060" y1="450" x2="1236" y2="450" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <line id="base-line-bottom" x1="1060" y1="450" x2="1060" y2="614" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <line id="base-line-left" x1="1060" y1="450" x2="890" y2="450" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <circle id="slot-top" cx="1060" cy="286" r="36" fill="none" stroke="#b5b5b5" stroke-width="3" />
                  <circle id="slot-right" cx="1236" cy="450" r="36" fill="none" stroke="#b5b5b5" stroke-width="3" />
                  <circle id="slot-bottom" cx="1060" cy="614" r="36" fill="none" stroke="#b5b5b5" stroke-width="3" />
                  <circle id="slot-left" cx="890" cy="450" r="36" fill="none" stroke="#b5b5b5" stroke-width="3" />
                </g>

                <g id="transform-group" opacity="0">
                  <circle id="hub-ring" cx="1060" cy="450" r="36" fill="none" stroke="#9c9c9c" stroke-width="3" />
                  <circle id="weave-ring" cx="1060" cy="450" r="92" fill="none" stroke="#ffccd5" stroke-width="5" opacity="0" />

                  <line id="active-line-top" x1="1060" y1="450" x2="1060" y2="450" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" opacity="0" />
                  <line id="active-line-right" x1="1060" y1="450" x2="1060" y2="450" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" opacity="0" />
                  <line id="active-line-bottom" x1="1060" y1="450" x2="1060" y2="450" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" opacity="0" />
                  <line id="active-line-left" x1="1060" y1="450" x2="1060" y2="450" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" opacity="0" />

                  <circle id="node-top" cx="1060" cy="286" r="16" fill="#ffffff" stroke="#4f4f4f" stroke-width="4" opacity="0" />
                  <circle id="node-right" cx="1236" cy="450" r="16" fill="#ffffff" stroke="#4f4f4f" stroke-width="4" opacity="0" />
                  <circle id="node-bottom" cx="1060" cy="614" r="16" fill="#ffffff" stroke="#4f4f4f" stroke-width="4" opacity="0" />
                  <circle id="node-left" cx="890" cy="450" r="16" fill="#ffffff" stroke="#4f4f4f" stroke-width="4" opacity="0" />

                  <circle id="pulse-top" cx="1060" cy="286" r="16" fill="none" stroke="#9e1b32" stroke-width="4" opacity="0" />
                  <circle id="pulse-right" cx="1236" cy="450" r="16" fill="none" stroke="#9e1b32" stroke-width="4" opacity="0" />
                  <circle id="pulse-bottom" cx="1060" cy="614" r="16" fill="none" stroke="#9e1b32" stroke-width="4" opacity="0" />
                  <circle id="pulse-left" cx="890" cy="450" r="16" fill="none" stroke="#9e1b32" stroke-width="4" opacity="0" />
                </g>
              </g>

              <g id="resolution-group" opacity="0">
                <circle id="final-shell" cx="820" cy="450" r="142" fill="none" stroke="#ffccd5" stroke-width="4" opacity="0" />
                <circle id="final-core-ring" cx="820" cy="450" r="74" fill="none" stroke="#9e1b32" stroke-width="3" opacity="0" />
                <path
                  id="final-orbit"
                  d="M 730 420 C 764 352, 892 350, 928 438 C 960 522, 864 594, 774 564"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="10 12"
                  opacity="0"
                />
              </g>

              <circle id="dot-halo" cx="340" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
              <circle id="dot-core" cx="340" cy="450" r="18" fill="#9e1b32" opacity="0" />
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
