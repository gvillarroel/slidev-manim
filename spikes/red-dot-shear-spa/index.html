<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Shear SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot shear narrative">
        <div class="stage-frame">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot shear narrative</title>
            <desc id="stage-desc">
              A single red point appears, tests several offset step forms, compresses through a shearing
              gap, then resolves that pressure into a calm aligned aperture.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="left-glow" cx="22%" cy="42%" r="32%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="right-glow" cx="76%" cy="52%" r="38%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96" />
                <stop offset="60%" stop-color="#ffffff" stop-opacity="0.3" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="dot-halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.82" />
                <stop offset="74%" stop-color="#ffccd5" stop-opacity="0.16" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="slab-gloss-top" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3f4851" />
                <stop offset="100%" stop-color="#2f373f" />
              </linearGradient>
              <linearGradient id="slab-gloss-bottom" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#343c44" />
                <stop offset="100%" stop-color="#48535e" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="360" cy="412" rx="360" ry="250" fill="url(#left-glow)" opacity="0.84" />
            <ellipse cx="1036" cy="450" rx="560" ry="300" fill="url(#right-glow)" opacity="0.94" />
            <rect x="98" y="96" width="1404" height="708" fill="#ffffff" opacity="0.58" stroke="#d7d7d7" stroke-width="2" />
            <path d="M 150 280 H 1450" stroke="#efefef" stroke-width="1" />
            <path d="M 150 450 H 1450" stroke="#e6e6e6" stroke-width="1.5" />
            <path d="M 150 620 H 1450" stroke="#efefef" stroke-width="1" />
            <path d="M 420 170 V 730" stroke="#ededed" stroke-width="1" />
            <path d="M 860 150 V 750" stroke="#e9e9e9" stroke-width="1.5" />
            <path d="M 1260 170 V 730" stroke="#ededed" stroke-width="1" />

            <g id="scene-root">
              <path
                id="travel-spine"
                d="M 280 450 C 364 450, 430 418, 528 316 S 620 372, 664 450 S 616 528, 520 582 S 688 520, 840 450 S 908 450, 924 450 S 888 450, 860 450"
                fill="none"
                stroke="#cfcfcf"
                stroke-width="5"
                stroke-linecap="round"
                stroke-dasharray="10 14"
                opacity="0"
              />
              <path
                id="active-trail"
                d="M 280 450 C 364 450, 430 418, 528 316 S 620 372, 664 450 S 616 528, 520 582 S 688 520, 840 450 S 908 450, 924 450 S 888 450, 860 450"
                fill="none"
                stroke="#9e1b32"
                stroke-width="9"
                stroke-linecap="round"
                stroke-dasharray="0 1600"
                opacity="0"
              />

              <g id="destination-group" opacity="0">
                <path d="M 774 314 H 992" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                <path d="M 992 314 V 404 H 876" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M 728 586 H 946" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                <path d="M 728 586 V 496 H 844" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M 742 280 h34 M 742 280 v34" fill="none" stroke="#b5b5b5" stroke-width="5" stroke-linecap="square" />
                <path d="M 1024 280 h-34 M 1024 280 v34" fill="none" stroke="#b5b5b5" stroke-width="5" stroke-linecap="square" />
                <path d="M 698 620 h34 M 698 620 v-34" fill="none" stroke="#b5b5b5" stroke-width="5" stroke-linecap="square" />
                <path d="M 1068 620 h-34 M 1068 620 v-34" fill="none" stroke="#b5b5b5" stroke-width="5" stroke-linecap="square" />
              </g>

              <g id="search-group">
                <path
                  id="search-slot-top"
                  d="M 470 284 H 564 V 324 H 524 V 388"
                  fill="none"
                  stroke="#b5b5b5"
                  stroke-width="6"
                  stroke-linecap="square"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <path
                  id="search-slot-mid"
                  d="M 606 412 H 716 V 450 H 648 V 526"
                  fill="none"
                  stroke="#b5b5b5"
                  stroke-width="6"
                  stroke-linecap="square"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <path
                  id="search-slot-bottom"
                  d="M 478 616 H 572 V 576 H 532 V 512"
                  fill="none"
                  stroke="#b5b5b5"
                  stroke-width="6"
                  stroke-linecap="square"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <circle id="search-echo-top" cx="438" cy="318" r="10" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-mid" cx="748" cy="450" r="10" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-bottom" cx="444" cy="580" r="10" fill="#9e1b32" opacity="0" />
                <path id="search-arc-top" d="M 366 446 C 430 420, 472 366, 528 316" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-mid" d="M 528 316 C 608 344, 648 388, 664 450" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-bottom" d="M 664 450 C 626 526, 576 558, 520 582" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
              </g>

              <g id="shear-group" opacity="0">
                <path id="shear-track-top" d="M 682 382 H 1042" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0" />
                <path id="shear-track-bottom" d="M 622 518 H 982" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0" />
                <rect id="shear-top-slab" x="752" y="280" width="290" height="126" fill="url(#slab-gloss-top)" opacity="0.97" />
                <rect id="shear-bottom-slab" x="618" y="494" width="290" height="126" fill="url(#slab-gloss-bottom)" opacity="0.97" />
                <path
                  id="shear-seam-guide"
                  d="M 792 388 L 902 512"
                  fill="none"
                  stroke="#9c9c9c"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="9 12"
                  opacity="0"
                />
                <path id="pressure-tick-top" d="M 840 250 V 280" fill="none" stroke="#9e1b32" stroke-width="5" stroke-linecap="square" opacity="0" />
                <path id="pressure-tick-bottom" d="M 840 620 V 650" fill="none" stroke="#9e1b32" stroke-width="5" stroke-linecap="square" opacity="0" />
              </g>

              <g id="transform-group" opacity="0">
                <path id="transform-top-shelf" d="M 774 314 H 992" fill="none" stroke="#4f4f4f" stroke-width="8" stroke-linecap="round" opacity="0" />
                <path id="transform-top-step" d="M 992 314 V 404 H 876" fill="none" stroke="#4f4f4f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0" />
                <path id="transform-bottom-shelf" d="M 728 586 H 946" fill="none" stroke="#4f4f4f" stroke-width="8" stroke-linecap="round" opacity="0" />
                <path id="transform-bottom-step" d="M 728 586 V 496 H 844" fill="none" stroke="#4f4f4f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0" />
                <path id="outer-corner-tl" d="M 742 280 h34 M 742 280 v34" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="square" opacity="0" />
                <path id="outer-corner-tr" d="M 1024 280 h-34 M 1024 280 v34" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="square" opacity="0" />
                <path id="outer-corner-bl" d="M 698 620 h34 M 698 620 v-34" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="square" opacity="0" />
                <path id="outer-corner-br" d="M 1068 620 h-34 M 1068 620 v-34" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="square" opacity="0" />
                <path id="center-seam" d="M 860 338 V 562" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" opacity="0" />
                <path id="brace-top" d="M 896 392 L 972 332" fill="none" stroke="#4f4f4f" stroke-width="4" stroke-linecap="round" opacity="0" />
                <path id="brace-bottom" d="M 824 510 L 748 570" fill="none" stroke="#4f4f4f" stroke-width="4" stroke-linecap="round" opacity="0" />
                <circle id="brace-node-top" cx="972" cy="332" r="8" fill="#4f4f4f" opacity="0" />
                <circle id="brace-node-bottom" cx="748" cy="570" r="8" fill="#4f4f4f" opacity="0" />
              </g>

              <g id="resolution-group" opacity="0">
                <circle id="resolution-halo" cx="860" cy="450" r="126" fill="none" stroke="#ffccd5" stroke-width="4" opacity="0" />
                <path id="resolution-datum" d="M 748 646 H 972" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-linecap="round" opacity="0" />
              </g>

              <circle id="dot-halo" cx="280" cy="450" r="72" fill="url(#dot-halo-gradient)" opacity="0" />
              <circle id="dot-core" cx="280" cy="450" r="18" fill="#9e1b32" opacity="0" />
            </g>
          </svg>

          <div class="phase-chip" aria-live="polite">
            <p class="eyebrow">Red point shear</p>
            <p id="phase-label" class="phase-label">appearance</p>
          </div>

          <div class="timeline-overlay" aria-hidden="true">
            <div class="timeline-track">
              <div id="timeline-fill" class="timeline-fill"></div>
            </div>
            <div class="timeline-dots">
              <span class="timeline-dot" data-phase-dot="appearance"></span>
              <span class="timeline-dot" data-phase-dot="search"></span>
              <span class="timeline-dot" data-phase-dot="tension"></span>
              <span class="timeline-dot" data-phase-dot="transformation"></span>
              <span class="timeline-dot" data-phase-dot="resolution"></span>
            </div>
          </div>

          <div class="control-cluster" aria-label="Narrative controls">
            <button id="toggle-button" class="hud-button" type="button" aria-label="Pause narrative">pause</button>
            <button id="replay-button" class="hud-button" type="button" aria-label="Replay narrative">replay</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
