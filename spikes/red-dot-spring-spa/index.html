<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Spring SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot spring narrative</title>
            <desc id="stage-desc">
              A single red point appears, tests circular and zigzag grammars, compresses inside a
              top-and-bottom press, then releases into a centered spring-like structure.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f1f1f1" />
              </linearGradient>
              <radialGradient id="field-glow" cx="52%" cy="50%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="66%" stop-color="#ffffff" stop-opacity="0.28" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.84" />
                <stop offset="68%" stop-color="#ffccd5" stop-opacity="0.2" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.08" />
              </filter>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="802" cy="450" rx="682" ry="304" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1126" cy="430" rx="260" ry="220" fill="#ffccd5" opacity="0.14" />
            <rect
              x="94"
              y="110"
              width="1412"
              height="680"
              fill="#ffffff"
              opacity="0.68"
              stroke="#e7e7e7"
              stroke-width="1.5"
              filter="url(#soft-shadow)"
            />
            <rect x="144" y="178" width="1312" height="544" fill="#ffffff" opacity="0.24" />

            <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
              <path d="M 192 236 H 1408" />
              <path d="M 192 450 H 1408" />
              <path d="M 192 664 H 1408" />
              <path d="M 364 206 V 694" />
              <path d="M 820 206 V 694" />
              <path d="M 1260 206 V 694" />
            </g>

            <g id="scene-root">
              <path
                id="narrative-spine"
                d="M 344 450 C 432 430, 474 366, 520 302 C 586 332, 624 388, 668 424 C 624 512, 588 560, 548 610 C 656 562, 716 504, 760 468 C 810 468, 838 468, 860 468 C 916 468, 980 462, 1100 450 C 1028 450, 938 450, 820 450"
                fill="none"
                stroke="#d8d8d8"
                stroke-width="4"
                stroke-linecap="round"
                stroke-dasharray="6 14"
                opacity="0"
              />
              <path
                id="active-trail"
                d="M 344 450 C 432 430, 474 366, 520 302 C 586 332, 624 388, 668 424 C 624 512, 588 560, 548 610 C 656 562, 716 504, 760 468 C 810 468, 838 468, 860 468 C 916 468, 980 462, 1100 450 C 1028 450, 938 450, 820 450"
                fill="none"
                stroke="#9e1b32"
                stroke-width="9"
                stroke-linecap="round"
                stroke-dasharray="0 1600"
                opacity="0"
              />

              <g id="search-group">
                <circle id="search-orbit" cx="520" cy="302" r="58" fill="none" stroke="#b5b5b5" stroke-width="5" opacity="0" />
                <path
                  id="search-zigzag"
                  d="M 594 444 L 626 386 L 666 456 L 706 390 L 742 444"
                  fill="none"
                  stroke="#b5b5b5"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <path
                  id="search-wave"
                  d="M 468 610 C 506 574, 546 574, 584 610 C 620 646, 660 646, 698 610"
                  fill="none"
                  stroke="#b5b5b5"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <circle id="search-echo-top" cx="520" cy="302" r="9" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-mid" cx="668" cy="424" r="9" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-bottom" cx="584" cy="610" r="9" fill="#9e1b32" opacity="0" />
                <path id="search-arc-top" d="M 344 450 C 422 430, 472 360, 520 302" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-mid" d="M 520 302 C 580 334, 622 388, 668 424" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-bottom" d="M 668 424 C 622 514, 586 560, 548 610" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
              </g>

              <g id="tension-group" opacity="0">
                <rect id="press-top" x="732" y="224" width="256" height="162" fill="#333e48" opacity="0.92" />
                <rect id="press-bottom" x="732" y="550" width="256" height="162" fill="#333e48" opacity="0.92" />
                <path id="guide-lane" d="M 860 252 V 648" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0.44" />
                <rect id="compression-slot" x="814" y="304" width="92" height="328" fill="none" stroke="#9c9c9c" stroke-width="3" opacity="0.58" />
                <line id="energy-band-top" x1="826" y1="418" x2="894" y2="418" stroke="#ffccd5" stroke-width="6" stroke-linecap="round" opacity="0.24" />
                <line id="energy-band-mid" x1="822" y1="468" x2="898" y2="468" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" opacity="0.3" />
                <line id="energy-band-bottom" x1="826" y1="518" x2="894" y2="518" stroke="#ffccd5" stroke-width="6" stroke-linecap="round" opacity="0.24" />
                <circle id="pressure-ring" cx="860" cy="468" r="34" fill="none" stroke="#ffccd5" stroke-width="5" opacity="0.26" />
              </g>

              <g id="transform-rig">
                <g id="future-group" opacity="0">
                  <rect id="slot-top" x="994" y="236" width="212" height="86" fill="none" stroke="#b5b5b5" stroke-width="3" />
                  <rect id="slot-bottom" x="994" y="578" width="212" height="86" fill="none" stroke="#b5b5b5" stroke-width="3" />
                  <path id="spring-guide-top" d="M 1100 450 C 1048 434, 1152 408, 1100 384 C 1048 360, 1152 340, 1100 322" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-dasharray="8 12" opacity="0.42" />
                  <path id="spring-guide-bottom" d="M 1100 450 C 1048 468, 1152 492, 1100 516 C 1048 540, 1152 560, 1100 578" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-dasharray="8 12" opacity="0.42" />
                </g>

                <g id="transform-group" opacity="0">
                  <g id="anchor-top" opacity="0">
                    <rect x="994" y="236" width="212" height="86" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                    <path d="M 1038 272 H 1160" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                    <path d="M 1038 302 H 1126" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  </g>
                  <g id="anchor-bottom" opacity="0">
                    <rect x="994" y="578" width="212" height="86" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                    <path d="M 1038 614 H 1160" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                    <path d="M 1038 644 H 1126" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  </g>

                  <path
                    id="brace-left"
                    d="M 944 450 H 994"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <path
                    id="brace-right"
                    d="M 1206 450 H 1256"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <path
                    id="spring-top"
                    d="M 1100 450 C 1048 434, 1152 408, 1100 384 C 1048 360, 1152 340, 1100 322"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="10"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <path
                    id="spring-bottom"
                    d="M 1100 450 C 1048 468, 1152 492, 1100 516 C 1048 540, 1152 560, 1100 578"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="10"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <circle id="spring-aura" cx="1100" cy="450" r="104" fill="none" stroke="#ffccd5" stroke-width="5" opacity="0" />
                  <circle id="spring-center-ring" cx="1100" cy="450" r="62" fill="none" stroke="#9e1b32" stroke-width="3" opacity="0" />
                </g>
              </g>

              <g id="resolution-group" opacity="0">
                <line id="resolution-top-cap" x1="1048" y1="294" x2="1152" y2="294" stroke="#9c9c9c" stroke-width="3" stroke-linecap="round" opacity="0" />
                <line id="resolution-bottom-cap" x1="1048" y1="606" x2="1152" y2="606" stroke="#9c9c9c" stroke-width="3" stroke-linecap="round" opacity="0" />
              </g>

              <circle id="dot-halo" cx="344" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
              <circle id="dot-core" cx="344" cy="450" r="18" fill="#9e1b32" opacity="0" />
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
