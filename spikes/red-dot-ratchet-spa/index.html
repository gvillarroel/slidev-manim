<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Ratchet SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot ratchet visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot ratchet narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests a family of tooth-like structures, gets compressed between
              a pawl and a toothed arc, then rewrites that tension into a calm ratchet emblem.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fdfdfd" />
                <stop offset="100%" stop-color="#f1f1f1" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="50%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="76%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="810" cy="448" rx="706" ry="318" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1128" cy="264" rx="248" ry="150" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="444" cy="664" rx="282" ry="150" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect x="110" y="110" width="1380" height="680" fill="#ffffff" opacity="0.56" />
              <rect x="144" y="180" width="1312" height="540" fill="url(#plate-fade)" opacity="0.94" />
              <rect x="198" y="220" width="1204" height="460" fill="#ffffff" opacity="0.18" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 214 252 H 1386" />
                <path d="M 214 450 H 1386" />
                <path d="M 214 648 H 1386" />
                <path d="M 370 220 V 680" />
                <path d="M 800 220 V 680" />
                <path d="M 1230 220 V 680" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 300 450 C 420 450, 534 450, 676 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 300 450 C 420 450, 534 450, 676 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 530 450 L 620 394 H 720"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="square"
                  stroke-linejoin="miter"
                  stroke-dasharray="10 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 720 394 V 522 H 878"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="square"
                  stroke-linejoin="miter"
                  stroke-dasharray="10 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 878 522 L 958 398 H 1046"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="square"
                  stroke-linejoin="miter"
                  stroke-dasharray="10 12"
                  opacity="0"
                />

                <g id="candidate-ramp" opacity="0">
                  <path
                    d="M -82 22 L -38 -20 L 4 22 L 44 -20 L 84 22"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="8"
                    stroke-linecap="square"
                    stroke-linejoin="miter"
                  />
                  <path
                    d="M -56 8 H 24"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="6"
                    stroke-linecap="square"
                  />
                  <path
                    d="M 12 -6 L 42 -36"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                  />
                </g>

                <g id="candidate-pocket" opacity="0">
                  <path
                    d="M -78 28 V -26 L -18 -26 L 12 8 L 48 -26 H 82"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="8"
                    stroke-linecap="square"
                    stroke-linejoin="miter"
                  />
                  <path
                    d="M -28 8 H 40"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="6"
                    stroke-linecap="square"
                  />
                  <path
                    d="M 10 34 V -8"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                  />
                </g>

                <g id="candidate-wheel" opacity="0">
                  <path
                    d="M -78 20 A 76 76 0 0 1 18 -62"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="8"
                    stroke-linecap="square"
                  />
                  <path d="M -22 -32 L -2 -54 L 22 -28" fill="none" stroke="#4f4f4f" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" />
                  <path d="M 26 -14 L 64 -52 L 80 -36" fill="none" stroke="#4f4f4f" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" opacity="0.5" />
                  <path d="M 18 22 L 54 -12" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                </g>

                <path
                  id="tension-guide"
                  d="M 946 398 C 916 404, 886 418, 856 440 C 836 454, 820 470, 804 490"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="pawl-guide"
                  d="M 938 318 L 886 370"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 10"
                  opacity="0"
                />
                <path
                  id="track-arc-back"
                  d="M 668 500 A 176 176 0 0 1 954 320"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="10"
                  stroke-linecap="square"
                  opacity="0"
                />
                <path
                  id="track-arc-front"
                  d="M 712 516 A 150 150 0 0 1 938 358"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="6"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path id="tooth-a" d="M 698 486 L 730 454 L 754 482" fill="none" stroke="#4f4f4f" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter" opacity="0" />
                <path id="tooth-b" d="M 766 446 L 798 414 L 824 442" fill="none" stroke="#4f4f4f" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter" opacity="0" />
                <path id="tooth-c" d="M 836 404 L 868 372 L 894 400" fill="none" stroke="#4f4f4f" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter" opacity="0" />
                <path
                  id="capture-pocket"
                  d="M 768 474 L 804 508 L 846 466"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <g id="pawl-body" opacity="0">
                  <path
                    d="M 0 0 L 48 0 L 86 38 L 50 76 L 0 76"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="10"
                    stroke-linecap="square"
                    stroke-linejoin="miter"
                  />
                </g>
                <path
                  id="pawl-accent"
                  d="M 896 360 L 848 410"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="8"
                  stroke-linecap="round"
                  opacity="0"
                />
                <circle id="pressure-halo" cx="814" cy="462" r="146" fill="url(#halo-gradient)" opacity="0" />

                <path
                  id="resolve-arc"
                  d="M 666 500 A 176 176 0 0 1 954 320"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="10"
                  stroke-linecap="square"
                  opacity="0"
                />
                <path id="resolve-tooth-a" d="M 694 484 L 726 452 L 750 480" fill="none" stroke="#4f4f4f" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter" opacity="0" />
                <path id="resolve-tooth-b" d="M 760 446 L 792 414 L 818 442" fill="none" stroke="#4f4f4f" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter" opacity="0" />
                <path id="resolve-tooth-c" d="M 828 408 L 860 376 L 886 404" fill="none" stroke="#4f4f4f" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter" opacity="0" />
                <path id="resolve-tooth-d" d="M 886 370 L 918 338 L 942 366" fill="none" stroke="#4f4f4f" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter" opacity="0" />
                <g id="resolve-pawl" opacity="0">
                  <path
                    d="M 0 0 L 44 0 L 78 34 L 46 68 L 0 68"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="10"
                    stroke-linecap="square"
                    stroke-linejoin="miter"
                  />
                </g>
                <path
                  id="resolve-pawl-accent"
                  d="M 916 352 L 872 396"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="8"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="resolve-trace"
                  d="M 804 490 C 826 474, 846 454, 864 428 C 882 402, 894 378, 904 360"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="8"
                  stroke-linecap="round"
                  stroke-dasharray="0 900"
                  opacity="0"
                />
                <g id="resolve-corners" opacity="0">
                  <path d="M 646 332 H 694 V 380" fill="none" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M 978 332 H 930 V 380" fill="none" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M 646 566 H 694 V 518" fill="none" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M 978 566 H 930 V 518" fill="none" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
                </g>
                <circle id="resolution-halo" cx="820" cy="450" r="134" fill="url(#halo-gradient)" opacity="0" />

                <circle id="dot-halo" cx="300" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="300" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>
          <p id="phase-label" class="sr-only" aria-live="polite">appearance</p>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
