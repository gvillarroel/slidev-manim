<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Ratchet SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot ratchet visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot ratchet narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests several tooth-and-lock grammars, gets pinned inside a
              ratchet throat, then resolves into a calm centered ratchet mark.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="76%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="814" cy="452" rx="710" ry="320" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1128" cy="252" rx="226" ry="138" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="466" cy="658" rx="318" ry="172" fill="#ffffff" opacity="0.4" />

            <g id="layout-root">
              <rect x="108" y="110" width="1384" height="680" fill="#ffffff" opacity="0.56" />
              <rect x="144" y="180" width="1312" height="540" fill="url(#plate-fade)" opacity="0.94" />
              <rect x="200" y="220" width="1200" height="460" fill="#ffffff" opacity="0.16" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 220 252 H 1380" />
                <path d="M 220 452 H 1380" />
                <path d="M 220 652 H 1380" />
                <path d="M 374 220 V 680" />
                <path d="M 800 220 V 680" />
                <path d="M 1226 220 V 680" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 296 452 C 420 452, 562 452, 742 452"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 296 452 C 420 452, 562 452, 742 452"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 550 452 C 594 424, 620 410, 656 396"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 656 396 C 726 334, 778 314, 822 338"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 822 338 C 892 350, 944 374, 992 406"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-rack" opacity="0">
                  <path d="M -76 52 H 82" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path
                    d="M -62 52 V 24 H -20 V -2 H 22 V -28 H 64"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M -10 12 H 20" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-pawl" opacity="0">
                  <path
                    d="M -74 42 H 12 L 64 4 L 44 -28 L -4 -2 H -74"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <path d="M -28 8 H 8" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                  <path d="M 20 34 L 56 8" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                </g>

                <g id="candidate-wheel" opacity="0">
                  <circle cx="0" cy="0" r="58" fill="none" stroke="#4f4f4f" stroke-width="5" />
                  <rect x="36" y="-14" width="26" height="30" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <rect x="12" y="-52" width="26" height="30" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -18 8 H 16" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <circle
                  id="throat-arc"
                  cx="846"
                  cy="452"
                  r="124"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="420 360"
                  transform="rotate(-128 846 452)"
                  opacity="0"
                />
                <path
                  id="pawl-guide"
                  d="M 720 536 L 808 470"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <circle id="pressure-halo" cx="842" cy="452" r="124" fill="url(#halo-gradient)" opacity="0" />

                <g id="tooth-bank" opacity="0">
                  <path d="M 0 -110 V 110" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path d="M 0 -82 L 50 -52 L 0 -22 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path d="M 0 -20 L 50 10 L 0 40 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path d="M 0 42 L 50 72 L 0 102 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                </g>

                <g id="pawl-clamp" opacity="0">
                  <path
                    d="M -138 -20 H -32 L 30 24 L 8 54 L -74 18 H -138"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                </g>

                <circle id="wheel-base" cx="820" cy="450" r="110" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-dasharray="10 14" opacity="0" />
                <circle id="wheel-ring" cx="820" cy="450" r="110" fill="none" stroke="#4f4f4f" stroke-width="5" opacity="0" />
                <circle
                  id="wheel-trace"
                  cx="820"
                  cy="450"
                  r="110"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-dasharray="0 2400"
                  transform="rotate(142 820 450)"
                  opacity="0"
                />
                <path
                  id="pawl-trace"
                  d="M 716 530 L 808 468"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="8"
                  stroke-linecap="round"
                  stroke-dasharray="0 600"
                  opacity="0"
                />

                <g id="tooth-one" opacity="0">
                  <rect x="-14" y="-22" width="28" height="44" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="tooth-two" opacity="0">
                  <rect x="-14" y="-22" width="28" height="44" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="tooth-three" opacity="0">
                  <rect x="-14" y="-22" width="28" height="44" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="tooth-four" opacity="0">
                  <rect x="-14" y="-22" width="28" height="44" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>

                <g id="pawl-final" opacity="0">
                  <path
                    d="M -124 42 L -52 0 H 14 L 78 -40 L 58 -68 L -2 -24 H -72 L -144 18 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="anchor-grid" opacity="0" stroke="#cfcfcf" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="10 12">
                  <circle cx="820" cy="450" r="110" />
                  <path d="M 688 450 H 952" />
                  <path d="M 820 318 V 582" />
                </g>
                <circle id="resolution-halo" cx="820" cy="450" r="176" fill="url(#halo-gradient)" opacity="0" />
                <g id="resolution-frame" opacity="0" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" fill="none">
                  <path d="M 656 316 H 700 M 656 316 V 360" />
                  <path d="M 984 316 H 940 M 984 316 V 360" />
                  <path d="M 656 584 H 700 M 656 584 V 540" />
                  <path d="M 984 584 H 940 M 984 584 V 540" />
                </g>

                <circle id="dot-halo" cx="296" cy="452" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="296" cy="452" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
