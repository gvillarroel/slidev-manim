<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Radial Focus SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot radial focus visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot radial focus narrative</title>
            <desc id="stage-desc">
              A single red center travels into a calm field, emits three cards on staggered spokes,
              focuses one associated branch, rotates the whole system, then settles into a balanced resolved constellation.
            </desc>

            <defs>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.86" />
                <stop offset="74%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="#ffffff" />

            <g id="layout-root">
              <g id="ambient-grid" opacity="0.12" stroke="#cfcfcf" stroke-width="1">
                <path d="M 188 252 H 1412" />
                <path d="M 188 450 H 1412" />
                <path d="M 188 648 H 1412" />
                <path d="M 320 214 V 686" />
                <path d="M 800 214 V 686" />
                <path d="M 1280 214 V 686" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 500 450 C 556 450, 612 450, 680 450 C 742 450, 784 450, 824 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 500 450 C 556 450, 612 450, 680 450 C 742 450, 784 450, 824 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <g id="center-stage">
                  <circle id="hub-halo" cx="824" cy="450" r="114" fill="url(#halo-gradient)" opacity="0" />
                  <circle id="hub-shell" cx="824" cy="450" r="86" fill="none" stroke="#ffccd5" stroke-width="4" opacity="0" />
                  <circle id="hub-ring" cx="824" cy="450" r="54" fill="none" stroke="#9e1b32" stroke-width="5" opacity="0" />
                </g>

                <g id="future-rig">
                  <line id="future-spoke-a" x1="824" y1="450" x2="928" y2="278" stroke="#cfcfcf" stroke-width="3.5" stroke-linecap="round" opacity="0" />
                  <line id="future-spoke-b" x1="824" y1="450" x2="1060" y2="464" stroke="#cfcfcf" stroke-width="3.5" stroke-linecap="round" opacity="0" />
                  <line id="future-spoke-c" x1="824" y1="450" x2="668" y2="584" stroke="#cfcfcf" stroke-width="3.5" stroke-linecap="round" opacity="0" />

                  <g id="slot-a" opacity="0">
                    <rect x="850" y="214" width="156" height="102" fill="none" stroke="#cfcfcf" stroke-width="3" />
                  </g>
                  <g id="slot-b" opacity="0">
                    <rect x="1076" y="412" width="164" height="102" fill="none" stroke="#cfcfcf" stroke-width="3" />
                  </g>
                  <g id="slot-c" opacity="0">
                    <rect x="566" y="538" width="164" height="102" fill="none" stroke="#cfcfcf" stroke-width="3" />
                  </g>
                </g>

                <g id="system-rig">
                  <g id="orbit-rig">
                    <line id="spoke-a" x1="0" y1="0" x2="104" y2="-172" stroke="#4f4f4f" stroke-width="4.5" stroke-linecap="round" opacity="0" />
                    <line id="spoke-b" x1="0" y1="0" x2="236" y2="14" stroke="#4f4f4f" stroke-width="4.5" stroke-linecap="round" opacity="0" />
                    <line id="spoke-c" x1="0" y1="0" x2="-150" y2="138" stroke="#4f4f4f" stroke-width="4.5" stroke-linecap="round" opacity="0" />

                    <line id="focus-beam" x1="0" y1="0" x2="0" y2="0" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" opacity="0" />

                    <g id="card-a" opacity="0">
                      <rect x="26" y="-236" width="168" height="108" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                      <path d="M 58 -198 H 150" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                      <path d="M 58 -164 H 130" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                    </g>

                    <g id="card-b" opacity="0">
                      <rect x="160" y="-42" width="176" height="108" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                      <path d="M 194 -4 H 294" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                      <path d="M 194 30 H 268" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                    </g>

                    <g id="card-c" opacity="0">
                      <rect x="-250" y="86" width="176" height="108" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                      <path d="M -216 124 H -114" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                      <path d="M -216 158 H -144" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                    </g>

                    <g id="focus-frame" opacity="0">
                      <path d="M -106 -74 H -82 M -106 -74 V -50" fill="none" stroke="#9e1b32" stroke-width="4.5" stroke-linecap="round" />
                      <path d="M 106 -74 H 82 M 106 -74 V -50" fill="none" stroke="#9e1b32" stroke-width="4.5" stroke-linecap="round" />
                      <path d="M -106 74 H -82 M -106 74 V 50" fill="none" stroke="#9e1b32" stroke-width="4.5" stroke-linecap="round" />
                      <path d="M 106 74 H 82 M 106 74 V 50" fill="none" stroke="#9e1b32" stroke-width="4.5" stroke-linecap="round" />
                    </g>

                    <line id="chip-line-1" x1="0" y1="0" x2="0" y2="0" stroke="#9e1b32" stroke-width="3.5" stroke-linecap="round" opacity="0" />
                    <line id="chip-line-2" x1="0" y1="0" x2="0" y2="0" stroke="#9e1b32" stroke-width="3.5" stroke-linecap="round" opacity="0" />
                    <line id="chip-line-3" x1="0" y1="0" x2="0" y2="0" stroke="#9e1b32" stroke-width="3.5" stroke-linecap="round" opacity="0" />

                    <g id="chip-1" opacity="0">
                      <rect x="-42" y="-15" width="84" height="30" fill="#ffffff" stroke="#9e1b32" stroke-width="3" />
                      <path d="M -20 0 H 20" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" />
                    </g>
                    <g id="chip-2" opacity="0">
                      <rect x="-42" y="-15" width="84" height="30" fill="#ffffff" stroke="#9e1b32" stroke-width="3" />
                      <path d="M -18 0 H 18" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" />
                    </g>
                    <g id="chip-3" opacity="0">
                      <rect x="-42" y="-15" width="84" height="30" fill="#ffffff" stroke="#9e1b32" stroke-width="3" />
                      <path d="M -14 0 H 14" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" />
                    </g>
                  </g>
                </g>

                <g id="resolution-group" opacity="0">
                  <circle id="resolution-shell" cx="824" cy="450" r="170" fill="none" stroke="#ffccd5" stroke-width="4" opacity="0" />
                  <path
                    id="resolution-orbit"
                    d="M 658 430 C 730 334, 920 326, 1010 438 C 1074 516, 1012 624, 888 646"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="3"
                    stroke-linecap="round"
                    stroke-dasharray="10 12"
                    opacity="0"
                  />
                </g>

                <circle id="dot-halo" cx="500" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="500" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
