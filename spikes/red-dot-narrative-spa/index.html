<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Narrative SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot visual narrative">
        <div class="stage-frame">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot narrative</title>
            <desc id="stage-desc">
              A single red point appears, searches for structure, passes through a visual conflict,
              transforms into a connective system, and settles into a centered final composition.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <linearGradient id="grid-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
                <stop offset="18%" stop-color="#f7f7f7" stop-opacity="1" />
                <stop offset="82%" stop-color="#f7f7f7" stop-opacity="1" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </linearGradient>
              <radialGradient id="stage-glow" cx="54%" cy="50%" r="42%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96" />
                <stop offset="60%" stop-color="#ffffff" stop-opacity="0.28" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </linearGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.78" />
                <stop offset="70%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.08" />
              </filter>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <rect x="88" y="92" width="1424" height="716" fill="#ffffff" opacity="0.62" stroke="#cfcfcf" stroke-width="2" />
            <rect x="112" y="160" width="1376" height="580" fill="url(#grid-fade)" opacity="0.84" />
            <ellipse cx="860" cy="450" rx="680" ry="300" fill="url(#stage-glow)" opacity="0.92" />
            <rect x="180" y="206" width="1240" height="488" rx="0" fill="#ffffff" opacity="0.26" />

            <g id="ambient-grid" opacity="0.11" stroke="#cfcfcf" stroke-width="1">
              <path d="M 180 222 H 1420" />
              <path d="M 180 450 H 1420" />
              <path d="M 180 678 H 1420" />
              <path d="M 336 200 V 700" />
              <path d="M 800 200 V 700" />
              <path d="M 1264 200 V 700" />
            </g>

            <g id="scene-root">
              <path
                id="narrative-spine"
                d="M 310 450 C 400 450, 444 450, 520 450 C 610 450, 680 450, 752 450 C 828 450, 910 450, 992 450 C 1080 450, 1168 450, 1260 450"
                fill="none"
                stroke="#cfcfcf"
                stroke-width="5"
                stroke-linecap="round"
                stroke-dasharray="10 14"
                opacity="0"
              />
              <path
                id="active-trail"
                d="M 310 450 C 400 450, 444 450, 520 450 C 610 450, 680 450, 752 450 C 828 450, 910 450, 992 450 C 1080 450, 1168 450, 1260 450"
                fill="none"
                stroke="#9e1b32"
                stroke-width="9"
                stroke-linecap="round"
                stroke-dasharray="0 1200"
                opacity="0"
              />

              <g id="search-group">
                <circle id="search-circle" cx="486" cy="304" r="56" fill="none" stroke="#b5b5b5" stroke-width="6" opacity="0" />
                <rect id="search-square" x="534" y="388" width="120" height="120" fill="none" stroke="#b5b5b5" stroke-width="6" opacity="0" />
                <g id="search-card" opacity="0">
                  <rect x="430" y="548" width="204" height="116" fill="#ffffff" stroke="#b5b5b5" stroke-width="6" />
                  <path d="M 468 590 H 588" stroke="#9c9c9c" stroke-width="6" stroke-linecap="round" stroke-opacity="0.28" />
                  <path d="M 468 626 H 552" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" stroke-opacity="0.28" />
                </g>
                <circle id="search-echo-top" cx="390" cy="304" r="10" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-mid" cx="594" cy="448" r="10" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-bottom" cx="330" cy="606" r="10" fill="#9e1b32" opacity="0" />
                <path id="search-arc-top" d="M 348 450 C 392 398, 432 340, 486 304" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-mid" d="M 486 304 C 540 350, 560 388, 594 448" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-bottom" d="M 594 448 C 520 508, 420 572, 330 606" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
              </g>

              <g id="tension-group" opacity="0">
                <rect id="clamp-top" x="706" y="234" width="316" height="132" fill="#333e48" opacity="0.94" />
                <rect id="clamp-bottom" x="706" y="534" width="316" height="132" fill="#333e48" opacity="0.94" />
                <rect id="clamp-gate" x="800" y="315" width="96" height="270" fill="none" stroke="#9c9c9c" stroke-width="3" opacity="0.5" />
                <path id="clamp-track" d="M 670 450 H 1048" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" opacity="0.65" />
              </g>

              <g id="transform-group" opacity="0">
                <circle id="transform-ring" cx="1070" cy="450" r="92" fill="none" stroke="#9e1b32" stroke-width="10" opacity="0" />
                <circle id="transform-ring-secondary" cx="1070" cy="450" r="138" fill="none" stroke="#ffccd5" stroke-width="6" opacity="0" />
                <path id="connector-a" d="M 1070 450 L 980 300" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" opacity="0" />
                <path id="connector-b" d="M 1070 450 L 1270 392" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" opacity="0" />
                <path id="connector-c" d="M 1070 450 L 986 628" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" opacity="0" />

                <g id="card-a" opacity="0">
                  <rect x="902" y="224" width="156" height="112" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M 936 262 H 1016" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M 936 296 H 996" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>
                <g id="card-b" opacity="0">
                  <rect x="1198" y="336" width="162" height="112" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M 1232 374 H 1324" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M 1232 408 H 1296" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>
                <g id="card-c" opacity="0">
                  <rect x="906" y="572" width="166" height="112" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M 940 610 H 1034" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M 940 644 H 1004" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>
              </g>

              <g id="resolution-group" opacity="0">
                <circle id="resolution-aura" cx="820" cy="450" r="150" fill="none" stroke="#ffccd5" stroke-width="4" opacity="0" />
              </g>

              <circle id="dot-halo" cx="310" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
              <circle id="dot-core" cx="310" cy="450" r="18" fill="#9e1b32" opacity="0" />
            </g>
          </svg>

          <div class="phase-chip" aria-live="polite">
            <p class="eyebrow">Red point narrative</p>
            <p id="phase-label" class="phase-label">appearance</p>
          </div>

          <div class="timeline-overlay" aria-hidden="true">
            <div class="timeline-track">
              <div id="timeline-fill" class="timeline-fill"></div>
            </div>
            <div class="timeline-dots">
              <span class="timeline-dot" data-phase-dot="appearance"></span>
              <span class="timeline-dot" data-phase-dot="search"></span>
              <span class="timeline-dot" data-phase-dot="tension"></span>
              <span class="timeline-dot" data-phase-dot="transformation"></span>
              <span class="timeline-dot" data-phase-dot="resolution"></span>
            </div>
          </div>

          <div class="control-cluster" aria-label="Narrative controls">
            <button id="toggle-button" class="hud-button" type="button" aria-label="Pause narrative">pause</button>
            <button id="replay-button" class="hud-button" type="button" aria-label="Replay narrative">replay</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
