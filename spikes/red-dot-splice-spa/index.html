<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Splice SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot splice visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot splice narrative</title>
            <desc id="stage-desc">
              A single red point appears on a quiet field, tests three joining grammars, compresses inside a broken
              seam, then traces a splice that resolves the gap into a centered connected emblem.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f1f1f1" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="82%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="808" cy="448" rx="716" ry="318" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1128" cy="252" rx="234" ry="146" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="452" cy="654" rx="312" ry="182" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect x="108" y="110" width="1384" height="680" fill="#ffffff" opacity="0.56" />
              <rect x="142" y="180" width="1316" height="540" fill="url(#plate-fade)" opacity="0.94" />
              <rect x="198" y="220" width="1204" height="460" fill="#ffffff" opacity="0.18" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 214 252 H 1386" />
                <path d="M 214 450 H 1386" />
                <path d="M 214 648 H 1386" />
                <path d="M 370 220 V 680" />
                <path d="M 800 220 V 680" />
                <path d="M 1230 220 V 680" />
                <path d="M 560 246 L 1060 654" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 296 450 C 432 450, 562 450, 742 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 296 450 C 432 450, 562 450, 742 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 516 450 C 564 428, 598 408, 644 388"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 644 388 C 718 342, 770 324, 830 334"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 830 334 C 896 340, 950 382, 984 514"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-lap" opacity="0">
                  <rect x="-82" y="-26" width="82" height="38" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <rect x="0" y="-8" width="82" height="38" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -12 10 H 18" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-chevron" opacity="0">
                  <path
                    d="M -78 26 L -18 -28 H 6 L 66 26"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M -68 44 H -12 L 18 16 H 72"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M -14 8 H 16" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-stitch" opacity="0">
                  <path d="M -68 -40 V 40 H -22" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path d="M 68 40 V -40 H 22" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path d="M -12 -18 L 14 8 M -12 8 L 14 34" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <path
                  id="seam-left-guide"
                  d="M 654 450 H 782"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="seam-right-guide"
                  d="M 858 450 H 986"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="route-base"
                  d="M 820 450 L 784 450 L 728 408 L 820 360 L 912 408 L 856 450 L 912 492 L 820 540 L 728 492 L 784 450 L 820 450"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="route-active"
                  d="M 820 450 L 784 450 L 728 408 L 820 360 L 912 408 L 856 450 L 912 492 L 820 540 L 728 492 L 784 450 L 820 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 2400"
                  opacity="0"
                />

                <circle id="pressure-halo" cx="820" cy="450" r="126" fill="url(#halo-gradient)" opacity="0" />
                <g id="clamp-left" opacity="0">
                  <rect x="-26" y="-88" width="52" height="176" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="clamp-right" opacity="0">
                  <rect x="-26" y="-88" width="52" height="176" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="clamp-top" opacity="0">
                  <rect x="-92" y="-22" width="184" height="44" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="clamp-bottom" opacity="0">
                  <rect x="-92" y="-22" width="184" height="44" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>

                <g id="slot-left-rail" opacity="0">
                  <path d="M -74 -26 H 8 M -74 -26 V 26" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 20 0 H 56" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-top-link" opacity="0">
                  <path d="M -72 18 L -16 -22 M -8 -30 H 52" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 62 -12 L 18 18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-right-rail" opacity="0">
                  <path d="M -56 0 H -20" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -8 -26 H 74 M 74 -26 V 26" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-bottom-link" opacity="0">
                  <path d="M -62 12 L -18 -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -52 30 H 8 L 72 -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="left-rail" opacity="0">
                  <path
                    d="M -104 -26 H 30 L 56 0 L 30 26 H -104 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <path d="M -18 0 H 18" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <g id="top-link" opacity="0">
                  <path
                    d="M -102 18 L -24 -34 H 102 L 24 18 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <path d="M -12 0 H 18" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <g id="right-rail" opacity="0">
                  <path
                    d="M 104 -26 H -30 L -56 0 L -30 26 H 104 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <path d="M 18 0 H -18" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <g id="bottom-link" opacity="0">
                  <path
                    d="M -102 -18 L -24 34 H 102 L 24 -18 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <path d="M -12 0 H 18" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g
                  id="anchor-grid"
                  opacity="0"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  fill="none"
                  stroke-dasharray="10 12"
                >
                  <path d="M 654 450 H 986" />
                  <path d="M 728 408 L 820 360 L 912 408" />
                  <path d="M 728 492 L 820 540 L 912 492" />
                </g>
                <circle id="resolution-halo" cx="820" cy="450" r="170" fill="url(#halo-gradient)" opacity="0" />
                <g id="resolution-frame" opacity="0" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" fill="none">
                  <path d="M 662 336 H 706 M 662 336 V 380" />
                  <path d="M 978 336 H 934 M 978 336 V 380" />
                  <path d="M 662 564 H 706 M 662 564 V 520" />
                  <path d="M 978 564 H 934 M 978 564 V 520" />
                </g>

                <circle id="dot-halo" cx="296" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="296" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
