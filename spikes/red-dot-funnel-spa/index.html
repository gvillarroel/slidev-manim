<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Funnel SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot funnel visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot funnel narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests three merge routes, gets compressed into a narrow funnel
              throat, then resolves into a centered merge mark that holds the chosen convergence in place.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="48%" r="52%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="80%" stop-color="#ffffff" stop-opacity="0.24" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.92" />
                <stop offset="68%" stop-color="#ffccd5" stop-opacity="0.22" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="merge-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="60%" stop-color="#ffccd5" stop-opacity="0.24" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="824" cy="450" rx="724" ry="308" fill="url(#field-glow)" opacity="0.98" />
            <ellipse cx="1184" cy="248" rx="224" ry="136" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="414" cy="678" rx="268" ry="150" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect x="176" y="220" width="1248" height="410" fill="#ffffff" opacity="0.16" />
              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 220 284 H 1380" />
                <path d="M 220 454 H 1380" />
                <path d="M 220 624 H 1380" />
                <path d="M 540 230 V 676" />
                <path d="M 860 230 V 676" />
                <path d="M 1180 230 V 676" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 302 454 C 434 454, 534 454, 600 454"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 648 454 C 674 426, 692 390, 716 344"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 716 344 C 776 322, 840 322, 892 352"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 892 352 C 934 374, 966 400, 882 428"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-a" opacity="0">
                  <path
                    d="M -60 28 L -16 -18 L 46 -18 M -16 -18 V -84"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle cx="-2" cy="16" r="10" fill="#9e1b32" opacity="0.92" />
                </g>

                <g id="candidate-b" opacity="0">
                  <path
                    d="M -52 -76 V 26 M 0 -76 V 18 M 52 -76 V 26 M -52 -76 H 52"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle cx="0" cy="28" r="10" fill="#9e1b32" opacity="0.92" />
                </g>

                <g id="candidate-c" opacity="0">
                  <path
                    d="M -52 -62 H 22 V 18 H 76"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle cx="8" cy="18" r="10" fill="#9e1b32" opacity="0.92" />
                </g>

                <ellipse id="tension-halo" cx="860" cy="452" rx="182" ry="134" fill="url(#merge-glow)" opacity="0" />
                <path
                  id="merge-left-guide"
                  d="M 716 344 C 780 376, 820 404, 842 436"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="6"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="merge-right-guide"
                  d="M 1004 344 C 940 376, 900 404, 878 436"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="6"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="stem-slot"
                  d="M 842 438 V 598 M 878 438 V 598"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="6"
                  stroke-linecap="round"
                  opacity="0"
                />

                <g id="throat-left" opacity="0">
                  <path
                    d="M 0 -34 V 34 M 0 -34 H 24 M 0 34 H 24"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="throat-right" opacity="0">
                  <path
                    d="M 0 -34 V 34 M 0 -34 H -24 M 0 34 H -24"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <path
                  id="funnel-base"
                  d="M 860 452
                     C 814 428, 772 390, 716 344
                     C 780 376, 820 404, 842 436
                     L 842 578
                     L 878 578
                     L 878 436
                     C 900 404, 940 376, 1004 344
                     C 948 390, 906 428, 860 452"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <path
                  id="funnel-active"
                  d="M 860 452
                     C 814 428, 772 390, 716 344
                     C 780 376, 820 404, 842 436
                     L 842 578
                     L 878 578
                     L 878 436
                     C 900 404, 940 376, 1004 344
                     C 948 390, 906 428, 860 452"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0"
                />

                <path
                  id="merge-tick"
                  d="M 816 618 H 904"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="4"
                  stroke-linecap="round"
                  opacity="0"
                />

                <ellipse id="resolution-halo" cx="860" cy="452" rx="152" ry="158" fill="url(#merge-glow)" opacity="0" />
                <circle id="resolution-ring" cx="860" cy="452" r="86" fill="none" stroke="#9e1b32" stroke-width="5" opacity="0" />

                <circle id="dot-halo" cx="302" cy="454" r="72" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="302" cy="454" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
