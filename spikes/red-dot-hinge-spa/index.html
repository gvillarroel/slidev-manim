<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Hinge SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot hinge visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot hinge narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests three hinge grammars, gets compressed between opposing shutters,
              then resolves into a calm centered hinge where the red point becomes the pin that holds the opened wings together.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="51%" cy="49%" r="50%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="78%" stop-color="#ffffff" stop-opacity="0.28" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.9" />
                <stop offset="68%" stop-color="#ffccd5" stop-opacity="0.22" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="hinge-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96" />
                <stop offset="58%" stop-color="#ffccd5" stop-opacity="0.22" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="816" cy="452" rx="708" ry="304" fill="url(#field-glow)" opacity="0.98" />
            <ellipse cx="1188" cy="256" rx="226" ry="136" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="426" cy="676" rx="252" ry="146" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect x="188" y="224" width="1224" height="402" fill="#ffffff" opacity="0.18" />
              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 220 282 H 1380" />
                <path d="M 220 454 H 1380" />
                <path d="M 220 626 H 1380" />
                <path d="M 530 228 V 676" />
                <path d="M 846 228 V 676" />
                <path d="M 1162 228 V 676" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 302 454 C 414 454, 500 454, 556 454"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 556 454 C 608 428, 640 404, 676 392 C 742 370, 794 348, 846 338 C 898 358, 952 388, 1000 410 C 982 432, 960 444, 934 454"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 1800"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 556 454 C 608 428, 640 404, 676 392"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 676 392 C 742 370, 794 348, 846 338"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 846 338 C 898 358, 952 388, 1000 410 C 982 432, 960 444, 934 454"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-flap" opacity="0">
                  <path
                    d="M 0 12 L -22 -36 V -120 M 0 12 L 22 -36 V -120 M -22 -120 H 22"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle cx="0" cy="12" r="10" fill="#9e1b32" opacity="0.92" />
                </g>

                <g id="candidate-corner" opacity="0">
                  <path
                    d="M -56 20 V -66 H 48 M -2 20 V -20 H 48"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M 48 -66 V -20" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  <circle cx="-2" cy="20" r="10" fill="#9e1b32" opacity="0.92" />
                </g>

                <g id="candidate-split" opacity="0">
                  <path
                    d="M -104 -28 H -26 M -104 28 H -26 M 26 -28 H 104 M 26 28 H 104 M -26 -28 V 28 M 26 -28 V 28"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle cx="0" cy="0" r="10" fill="#9e1b32" opacity="0.92" />
                </g>

                <ellipse id="tension-halo" cx="846" cy="454" rx="166" ry="126" fill="url(#hinge-glow)" opacity="0" />
                <path
                  id="throat-guide"
                  d="M 846 306 V 606"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />

                <g id="top-pin" opacity="0">
                  <path d="M 0 -132 V -74" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" />
                  <path d="M -18 -132 H 18" fill="none" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="bottom-slot" opacity="0">
                  <path d="M -42 0 H 42" fill="none" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="left-shutter" opacity="0">
                  <path
                    d="M -124 -44 H -68 L -12 0 L -68 44 H -124 M -124 -44 V 44"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="right-shutter" opacity="0">
                  <path
                    d="M 124 -44 H 68 L 12 0 L 68 44 H 124 M 124 -44 V 44"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <circle id="pivot-ring" cx="846" cy="454" r="54" fill="none" stroke="#cfcfcf" stroke-width="4" opacity="0" />

                <g id="wing-top" opacity="0">
                  <path
                    id="wing-top-path"
                    d="M 0 0 L -22 -46 V -132 M 0 0 L 22 -46 V -132 M -22 -132 H 22"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="wing-right" opacity="0">
                  <path
                    id="wing-right-path"
                    d="M 0 0 L -22 -46 V -132 M 0 0 L 22 -46 V -132 M -22 -132 H 22"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="wing-bottom" opacity="0">
                  <path
                    id="wing-bottom-path"
                    d="M 0 0 L -22 -46 V -132 M 0 0 L 22 -46 V -132 M -22 -132 H 22"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="wing-left" opacity="0">
                  <path
                    id="wing-left-path"
                    d="M 0 0 L -22 -46 V -132 M 0 0 L 22 -46 V -132 M -22 -132 H 22"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="active-top" opacity="0">
                  <path
                    id="active-top-path"
                    d="M 0 0 L -22 -46 V -132 M 0 0 L 22 -46 V -132 M -22 -132 H 22"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="active-right" opacity="0">
                  <path
                    id="active-right-path"
                    d="M 0 0 L -22 -46 V -132 M 0 0 L 22 -46 V -132 M -22 -132 H 22"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="active-bottom" opacity="0">
                  <path
                    id="active-bottom-path"
                    d="M 0 0 L -22 -46 V -132 M 0 0 L 22 -46 V -132 M -22 -132 H 22"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <g id="active-left" opacity="0">
                  <path
                    id="active-left-path"
                    d="M 0 0 L -22 -46 V -132 M 0 0 L 22 -46 V -132 M -22 -132 H 22"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </g>

                <ellipse id="resolution-halo" cx="846" cy="454" rx="146" ry="152" fill="url(#hinge-glow)" opacity="0" />
                <circle id="resolution-ring" cx="846" cy="454" r="84" fill="none" stroke="#9e1b32" stroke-width="5" opacity="0" />

                <circle id="dot-halo" cx="302" cy="454" r="72" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="302" cy="454" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
