<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Beacon SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot beacon visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot beacon narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests several signal grammars, compresses through a narrow
              aperture, then resolves into a calm beacon-like mark.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="78%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="812" cy="448" rx="710" ry="316" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1128" cy="282" rx="236" ry="156" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="444" cy="642" rx="246" ry="146" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect x="108" y="110" width="1384" height="680" fill="#ffffff" opacity="0.58" />
              <rect x="142" y="180" width="1316" height="540" fill="url(#plate-fade)" opacity="0.94" />
              <rect x="198" y="220" width="1204" height="460" fill="#ffffff" opacity="0.2" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 214 252 H 1386" />
                <path d="M 214 450 H 1386" />
                <path d="M 214 648 H 1386" />
                <path d="M 370 220 V 680" />
                <path d="M 800 220 V 680" />
                <path d="M 1230 220 V 680" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 304 450 C 432 450, 578 450, 760 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 304 450 C 432 450, 578 450, 760 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 560 450 C 600 420, 622 382, 648 344"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 648 344 C 718 300, 790 292, 840 316"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 840 316 C 920 326, 970 360, 1006 394"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-spire" opacity="0">
                  <path d="M 0 70 V -58" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -30 -72 H 30" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path d="M -58 -30 Q 0 -78 58 -30" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  <path d="M -44 16 Q 0 52 44 16" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>

                <g id="candidate-pulse" opacity="0">
                  <path
                    d="M -82 18 A 92 92 0 0 1 82 18"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                  />
                  <path
                    d="M -56 -8 A 64 64 0 0 1 56 -8"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                  />
                  <path d="M 0 74 V -26" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>

                <g id="candidate-lens" opacity="0">
                  <path
                    d="M -66 -44 H 18 V 42 H -66 V -44 M 18 -22 H 60 V 64 H 18"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M -28 -6 H 22 V 42" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M -40 70 H 40" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>

                <path
                  id="aperture-guide"
                  d="M 820 306 V 594"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <g id="shutter-left" opacity="0">
                  <path d="M -148 0 H -38" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" />
                  <rect x="-126" y="-86" width="92" height="172" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -56 -54 V 54" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <g id="shutter-right" opacity="0">
                  <path d="M 148 0 H 38" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" />
                  <rect x="34" y="-86" width="92" height="172" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M 56 -54 V 54" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <path id="brace-top" d="M 754 340 H 886" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" opacity="0" />
                <path id="brace-bottom" d="M 754 560 H 886" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" opacity="0" />
                <circle id="pressure-halo" cx="820" cy="450" r="124" fill="url(#halo-gradient)" opacity="0" />

                <circle
                  id="beacon-shell"
                  cx="820"
                  cy="450"
                  r="148"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  opacity="0"
                />
                <path
                  id="beacon-base"
                  d="M 820 450 L 820 302 A 148 148 0 1 1 819.9 302 L 820 450"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="beacon-trace"
                  d="M 820 450 L 820 302 A 148 148 0 1 1 819.9 302 L 820 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 2600"
                  opacity="0"
                />

                <g id="slot-top" opacity="0">
                  <path d="M -44 -24 H -20 M -44 -24 V 0" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 44 -24 H 20 M 44 -24 V 0" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-right" opacity="0">
                  <path d="M -24 -44 H 0 M -24 -44 V -20" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -24 44 H 0 M -24 44 V 20" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-bottom" opacity="0">
                  <path d="M -44 24 H -20 M -44 24 V 0" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 44 24 H 20 M 44 24 V 0" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-left" opacity="0">
                  <path d="M 24 -44 H 0 M 24 -44 V -20" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 24 44 H 0 M 24 44 V 20" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="marker-top" opacity="0">
                  <rect x="-44" y="-18" width="88" height="36" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M 0 18 V 68" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  <path d="M -14 0 H 14" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="marker-right" opacity="0">
                  <rect x="-18" y="-48" width="36" height="96" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -68 0 H -18" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  <path d="M 0 -14 V 14" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="marker-bottom" opacity="0">
                  <rect x="-54" y="-16" width="108" height="32" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M 0 -66 V -16" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  <path d="M -16 0 H 16" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="marker-left" opacity="0">
                  <rect x="-18" y="-48" width="36" height="96" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M 18 0 H 68" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  <path d="M 0 -14 V 14" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="anchor-grid" opacity="0" stroke="#cfcfcf" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="10 12">
                  <path d="M 758 450 H 882" />
                  <path d="M 820 388 V 512" />
                  <circle cx="820" cy="450" r="78" />
                </g>
                <path
                  id="signal-echo-inner"
                  d="M 750 250 Q 820 204 890 250"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="signal-echo-outer"
                  d="M 716 224 Q 820 156 924 224"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <circle id="resolution-halo" cx="820" cy="450" r="160" fill="url(#halo-gradient)" opacity="0" />
                <g id="resolution-frame" opacity="0" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" fill="none">
                  <path d="M 682 336 H 724 M 682 336 V 378" />
                  <path d="M 958 336 H 916 M 958 336 V 378" />
                  <path d="M 682 564 H 724 M 682 564 V 522" />
                  <path d="M 958 564 H 916 M 958 564 V 522" />
                </g>

                <circle id="dot-halo" cx="304" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="304" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
