<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Red Point Narrative SPA</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="experience-shell">
    <header class="hud">
      <p class="eyebrow">visual experiment</p>
      <h1>red point narrative</h1>
      <p class="act-label" id="act-label">appearance</p>
    </header>

    <section class="stage" aria-label="Red point visual narrative stage">
      <div class="stage-glow stage-glow-a"></div>
      <div class="stage-glow stage-glow-b"></div>
      <div class="grid grid-x"></div>
      <div class="grid grid-y"></div>
      <div class="candidate candidate-circle"></div>
      <div class="candidate candidate-square"></div>
      <div class="candidate candidate-arc"></div>
      <div class="gate gate-left"></div>
      <div class="gate gate-right"></div>
      <div class="gate-lane"></div>
      <div class="constellation-zone"></div>

      <div class="trail trail-a"></div>
      <div class="trail trail-b"></div>
      <div class="trail trail-c"></div>

      <div class="probe-line"></div>
      <div class="line line-a"></div>
      <div class="line line-b"></div>
      <div class="line line-c"></div>
      <div class="line line-d"></div>

      <div class="node node-a"></div>
      <div class="node node-b"></div>
      <div class="node node-c"></div>
      <div class="node node-d"></div>
      <div class="node node-e"></div>

      <div class="red-halo"></div>
      <div class="red-ring"></div>
      <div class="red-point"></div>
      <div class="pulse pulse-a"></div>
      <div class="pulse pulse-b"></div>
    </section>

    <footer class="timeline" aria-hidden="true">
      <span class="timeline-tick is-active"></span>
      <span class="timeline-tick"></span>
      <span class="timeline-tick"></span>
      <span class="timeline-tick"></span>
      <span class="timeline-tick"></span>
    </footer>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
