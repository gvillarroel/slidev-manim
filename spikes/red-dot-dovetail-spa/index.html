<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Dovetail SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot dovetail visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot dovetail narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests several join grammars, compresses inside a narrow
              dovetail throat, then resolves into a calm centered interlock.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="78%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="812" cy="448" rx="710" ry="316" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1112" cy="268" rx="242" ry="148" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="462" cy="646" rx="318" ry="184" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect x="108" y="110" width="1384" height="680" fill="#ffffff" opacity="0.56" />
              <rect x="142" y="180" width="1316" height="540" fill="url(#plate-fade)" opacity="0.94" />
              <rect x="198" y="220" width="1204" height="460" fill="#ffffff" opacity="0.18" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 214 252 H 1386" />
                <path d="M 214 450 H 1386" />
                <path d="M 214 648 H 1386" />
                <path d="M 370 220 V 680" />
                <path d="M 800 220 V 680" />
                <path d="M 1230 220 V 680" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 308 450 C 434 450, 586 450, 760 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 308 450 C 434 450, 586 450, 760 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 566 450 C 604 426, 628 408, 652 392"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 652 392 C 724 338, 776 318, 834 342"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 834 342 C 908 348, 964 366, 1006 390"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-slot" opacity="0">
                  <rect x="-74" y="-34" width="64" height="68" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M 10 -52 H 78 V 52 H 10 L 10 18 H 44 V -18 H 10 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path d="M -18 0 H 18" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-step" opacity="0">
                  <path
                    d="M -82 -50 H -14 L 14 -16 H 82 V 50 H 18 L -12 18 H -82 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <path d="M -20 0 H 22" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-dovetail" opacity="0">
                  <path
                    d="M -84 -52 H -24 L 10 -18 L 84 -18 V 18 H 10 L -24 52 H -84 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M 84 -52 H 24 L -10 -18 H -84 V 18 H -10 L 24 52 H 84 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                    opacity="0.34"
                  />
                  <path d="M -18 0 H 18" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <path
                  id="join-guide"
                  d="M 644 378 H 748 L 810 450 L 748 522 H 644 Z M 996 378 H 892 L 830 450 L 892 522 H 996 Z"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="seam-guide"
                  d="M 820 394 V 506"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <circle id="pressure-halo" cx="820" cy="450" r="132" fill="url(#halo-gradient)" opacity="0" />

                <g id="left-jaw" opacity="0">
                  <path
                    d="M -176 -72 H -72 L -10 -28 V 28 L -72 72 H -176 Z"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                </g>
                <g id="right-jaw" opacity="0">
                  <path
                    d="M 176 -72 H 72 L 10 -28 V 28 L 72 72 H 176 Z"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                </g>

                <path
                  id="join-shell"
                  d="M 644 378 H 748 L 810 450 L 748 522 H 644 Z M 996 378 H 892 L 830 450 L 892 522 H 996 Z"
                  fill="none"
                  stroke="#4f4f4f"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0"
                />
                <path
                  id="join-base"
                  d="M 644 378 H 748 L 810 450 L 748 522 H 644 Z M 996 378 H 892 L 830 450 L 892 522 H 996 Z"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="join-trace"
                  d="M 820 450 H 808 L 748 378 H 644 V 522 H 748 L 808 450 H 832 L 892 378 H 996 V 522 H 892 L 832 450 H 820"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 2400"
                  opacity="0"
                />
                <path
                  id="seam-base"
                  d="M 820 394 V 506"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="seam-trace"
                  d="M 820 394 V 506"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="7"
                  stroke-linecap="round"
                  stroke-dasharray="0 240"
                  opacity="0"
                />

                <g id="slot-left" opacity="0">
                  <path d="M -188 -84 H -152 M -188 -84 V -48" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -188 84 H -152 M -188 84 V 48" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -28 -42 H -8 M -8 -42 V -22" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -28 42 H -8 M -8 42 V 22" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-right" opacity="0">
                  <path d="M 188 -84 H 152 M 188 -84 V -48" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 188 84 H 152 M 188 84 V 48" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 28 -42 H 8 M 8 -42 V -22" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 28 42 H 8 M 8 42 V 22" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="left-piece" opacity="0">
                  <path
                    d="M -176 -72 H -72 L -10 -28 V 28 L -72 72 H -176 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <path d="M -128 0 H -70" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <g id="right-piece" opacity="0">
                  <path
                    d="M 176 -72 H 72 L 10 -28 V 28 L 72 72 H 176 Z"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <path d="M 128 0 H 70" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="anchor-grid" opacity="0" stroke="#cfcfcf" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="10 12">
                  <path d="M 644 378 H 748 L 810 450 L 748 522 H 644 Z" />
                  <path d="M 996 378 H 892 L 830 450 L 892 522 H 996 Z" />
                  <path d="M 820 394 V 506" />
                </g>
                <circle id="resolution-halo" cx="820" cy="450" r="176" fill="url(#halo-gradient)" opacity="0" />
                <g id="resolution-frame" opacity="0" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" fill="none">
                  <path d="M 660 354 H 700 M 660 354 V 394" />
                  <path d="M 980 354 H 940 M 980 354 V 394" />
                  <path d="M 660 546 H 700 M 660 546 V 506" />
                  <path d="M 980 546 H 940 M 980 546 V 506" />
                </g>

                <circle id="dot-halo" cx="308" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="308" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
