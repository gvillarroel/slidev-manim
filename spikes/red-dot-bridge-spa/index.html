<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Bridge SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot bridge visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot bridge narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests several bridge forms, survives a
              compressed crossing, then resolves into a calm centered span.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="52%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="78%" stop-color="#ffffff" stop-opacity="0.32" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.9" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.9" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
              </linearGradient>
              <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.05" />
              </filter>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="810" cy="448" rx="708" ry="308" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1098" cy="274" rx="214" ry="138" fill="#ffccd5" opacity="0.1" />
            <ellipse cx="476" cy="642" rx="204" ry="130" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect
                x="104"
                y="114"
                width="1392"
                height="672"
                fill="#ffffff"
                opacity="0.6"
                stroke="none"
              />
              <rect x="132" y="178" width="1336" height="544" fill="url(#plate-fade)" opacity="0.92" />
              <rect x="182" y="216" width="1236" height="468" fill="#ffffff" opacity="0.2" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 198 252 H 1402" />
                <path d="M 198 450 H 1402" />
                <path d="M 198 648 H 1402" />
                <path d="M 344 216 V 684" />
                <path d="M 800 216 V 684" />
                <path d="M 1256 216 V 684" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 304 450 C 430 450, 572 450, 744 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 304 450 C 430 450, 572 450, 744 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 560 450 C 582 408, 608 362, 636 318"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 636 318 C 722 274, 774 258, 820 262"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 820 262 C 918 274, 972 306, 1024 352"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-arch" opacity="0">
                  <path d="M -70 36 Q 0 -54 70 36" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path d="M -56 32 H 56" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -34 58 H 16" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="candidate-truss" opacity="0">
                  <rect x="-74" y="-44" width="148" height="88" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -74 44 H 74" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -62 34 L -22 -16 L 18 34 L 58 -16" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                </g>

                <g id="candidate-cable" opacity="0">
                  <path d="M -58 44 V -36 M 58 44 V -36" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path d="M -58 -20 Q 0 -74 58 -20" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  <path d="M -54 40 H 54" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                </g>

                <path
                  id="passage-top"
                  d="M 654 394 Q 820 356 986 394"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="6"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="passage-bottom"
                  d="M 654 506 Q 820 544 986 506"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="6"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="passage-left"
                  d="M -22 -76 H 0 M -22 -76 V 76 M -22 76 H 0"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="passage-right"
                  d="M 22 -76 H 0 M 22 -76 V 76 M 22 76 H 0"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <circle id="passage-halo" cx="820" cy="450" r="112" fill="url(#halo-gradient)" opacity="0" />

                <path
                  id="bridge-loop-base"
                  d="M 820 450 C 786 434, 718 436, 650 458 Q 820 310 990 458 C 938 446, 882 438, 820 450"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 12"
                  opacity="0"
                />
                <path
                  id="bridge-loop-active"
                  d="M 820 450 C 786 434, 718 436, 650 458 Q 820 310 990 458 C 938 446, 882 438, 820 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 2400"
                  opacity="0"
                />
                <path
                  id="bridge-base-top"
                  d="M 650 458 Q 820 310 990 458"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="bridge-base-bottom"
                  d="M 650 458 Q 820 560 990 458"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />

                <g id="slot-left" opacity="0">
                  <path d="M -70 -42 H -42 M -70 -42 V -14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 70 -42 H 42 M 70 -42 V -14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -70 42 H -42 M -70 42 V 14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 70 42 H 42 M 70 42 V 14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="slot-crown" opacity="0">
                  <path d="M -62 -38 H -38 M -62 -38 V -12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 62 -38 H 38 M 62 -38 V -12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -62 38 H -38 M -62 38 V 12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 62 38 H 38 M 62 38 V 12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="slot-right" opacity="0">
                  <path d="M -70 -42 H -42 M -70 -42 V -14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 70 -42 H 42 M 70 -42 V -14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -70 42 H -42 M -70 42 V 14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 70 42 H 42 M 70 42 V 14" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="deck-left" opacity="0">
                  <rect x="-78" y="-46" width="156" height="92" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -42 -6 H 36" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -52 22 H 20" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="deck-crown" opacity="0">
                  <rect x="-68" y="-40" width="136" height="80" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -36 -2 H 36" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -44 20 H 16" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="deck-right" opacity="0">
                  <rect x="-78" y="-46" width="156" height="92" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -38 -6 H 40" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -48 22 H 26" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <path
                  id="memory-arc"
                  d="M 684 540 Q 820 612 956 540"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="10 12"
                  opacity="0"
                />
                <circle id="resolution-halo" cx="820" cy="450" r="144" fill="url(#halo-gradient)" opacity="0" />
                <circle id="resolution-ring" cx="820" cy="450" r="88" fill="none" stroke="#9e1b32" stroke-width="5" opacity="0" />

                <circle id="dot-halo" cx="304" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="304" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
