<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Eclipse SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot eclipse visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot eclipse narrative</title>
            <desc id="stage-desc">
              A single red point appears in a quiet field, tests several eclipse grammars, gets compressed between two
              offset occluding bodies, then resolves into a calm centered eclipse system.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="50%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.99" />
                <stop offset="74%" stop-color="#ffffff" stop-opacity="0.26" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.92" />
                <stop offset="68%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="panel-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.9" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.9" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="800" cy="450" rx="724" ry="326" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1138" cy="264" rx="220" ry="150" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="420" cy="666" rx="228" ry="140" fill="#ffffff" opacity="0.44" />

            <g id="layout-root">
              <rect x="104" y="112" width="1392" height="676" fill="#ffffff" opacity="0.6" />
              <rect x="138" y="180" width="1324" height="540" fill="url(#panel-fade)" opacity="0.9" />
              <rect x="194" y="220" width="1212" height="460" fill="#ffffff" opacity="0.22" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 214 248 H 1386" />
                <path d="M 214 450 H 1386" />
                <path d="M 214 652 H 1386" />
                <path d="M 372 220 V 680" />
                <path d="M 800 220 V 680" />
                <path d="M 1228 220 V 680" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 448 450 C 530 450, 592 450, 742 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 448 450 C 530 450, 592 450, 742 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 644 450 C 644 420, 646 386, 650 346"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 650 346 C 726 306, 786 294, 840 314"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 840 314 C 926 324, 978 362, 1012 408"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-crescent" opacity="0">
                  <path
                    d="M -34 -62 A 84 84 0 1 1 -34 62"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linecap="round"
                  />
                  <path
                    d="M -8 -46 A 52 52 0 1 0 -8 46"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="5"
                    stroke-linecap="round"
                  />
                  <path
                    d="M 12 -24 A 28 28 0 0 1 12 24"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                  />
                </g>

                <g id="candidate-band" opacity="0">
                  <circle cx="0" cy="0" r="72" fill="none" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -76 0 H 76" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  <path d="M -18 0 H 40" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -20 -42 A 42 42 0 0 1 20 -42" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>

                <g id="candidate-orbit" opacity="0">
                  <path
                    d="M -74 0 A 74 52 0 1 1 74 0 A 74 52 0 1 1 -74 0"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="5"
                  />
                  <circle cx="42" cy="-26" r="20" fill="#ffffff" stroke="#cfcfcf" stroke-width="5" />
                  <path
                    d="M -18 26 A 42 30 0 0 0 54 20"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                  />
                </g>

                <circle id="tension-orbit" cx="820" cy="450" r="154" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-dasharray="10 14" opacity="0" />
                <circle id="tension-halo" cx="820" cy="450" r="130" fill="url(#halo-gradient)" opacity="0" />
                <circle id="shadow-upper" cx="760" cy="384" r="130" fill="#ffffff" fill-opacity="0.92" stroke="#4f4f4f" stroke-width="5" opacity="0" />
                <circle id="shadow-lower" cx="880" cy="516" r="130" fill="#ffffff" fill-opacity="0.92" stroke="#4f4f4f" stroke-width="5" opacity="0" />
                <path id="shadow-accent-upper" d="M 706 360 A 84 84 0 0 1 772 316" fill="none" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" opacity="0" />
                <path id="shadow-accent-lower" d="M 868 584 A 84 84 0 0 0 934 540" fill="none" stroke="#9e1b32" stroke-width="6" stroke-linecap="round" opacity="0" />

                <path
                  id="orbit-base"
                  d="M 820 326 A 124 124 0 1 1 819.99 326"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="orbit-active"
                  d="M 820 326 A 124 124 0 1 1 819.99 326"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-dasharray="0 2400"
                  opacity="0"
                />

                <g id="shell-left-slot" opacity="0">
                  <path d="M -58 -46 A 72 72 0 0 1 -58 46" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -12 -30 A 40 40 0 0 0 -12 30" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="shell-right-slot" opacity="0">
                  <path d="M 58 -46 A 72 72 0 0 0 58 46" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 12 -30 A 40 40 0 0 1 12 30" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="shell-left" opacity="0">
                  <path d="M -32 -60 A 84 84 0 1 1 -32 60" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path d="M -6 -44 A 54 54 0 1 0 -6 44" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>
                <g id="shell-right" opacity="0">
                  <path d="M 32 -60 A 84 84 0 1 0 32 60" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path d="M 6 -44 A 54 54 0 1 1 6 44" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>

                <path id="equator-line" d="M 698 450 H 942" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" opacity="0" />
                <path id="memory-arc" d="M 716 512 Q 820 582 924 512" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="10 12" opacity="0" />
                <circle id="resolution-halo" cx="820" cy="450" r="156" fill="url(#halo-gradient)" opacity="0" />
                <circle id="resolution-ring" cx="820" cy="450" r="92" fill="none" stroke="#9e1b32" stroke-width="5" opacity="0" />

                <circle id="dot-halo" cx="304" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="304" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
