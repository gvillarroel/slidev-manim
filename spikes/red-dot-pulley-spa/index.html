<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Pulley SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot pulley narrative">
        <div class="stage-frame" tabindex="0" aria-describedby="keyboard-help">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot pulley narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests hanging routes beneath one overhead beam, gets squeezed
              between two tightening sheaves, then redraws that pressure into a calm centered pulley-like emblem.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f0f0f0" />
              </linearGradient>
              <radialGradient id="field-glow" cx="54%" cy="46%" r="44%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="72%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="dot-halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.84" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.16" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="852" cy="452" rx="638" ry="304" fill="url(#field-glow)" opacity="0.96" />
            <rect x="112" y="114" width="1376" height="672" fill="#ffffff" opacity="0.58" />
            <rect x="184" y="188" width="1232" height="524" fill="#ffffff" opacity="0.24" />

            <g id="ambient-grid" opacity="0.1" stroke="#d4d4d4" stroke-width="1">
              <path d="M 192 238 H 1408" />
              <path d="M 192 452 H 1408" />
              <path d="M 192 666 H 1408" />
              <path d="M 384 188 V 714" />
              <path d="M 820 188 V 714" />
              <path d="M 1256 188 V 714" />
            </g>

            <g id="layout-root">
              <g id="scene-root">
                <path
                  id="travel-spine"
                  d="M 292 454 C 406 454, 478 454, 552 454 C 606 428, 638 408, 670 392 C 724 358, 774 330, 820 334 C 866 338, 914 360, 968 392 C 914 386, 870 398, 820 418"
                  fill="none"
                  stroke="#d1d1d1"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 292 454 C 406 454, 478 454, 552 454 C 606 428, 638 408, 670 392 C 724 358, 774 330, 820 334 C 866 338, 914 360, 968 392 C 914 386, 870 398, 820 418"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 2200"
                  opacity="0"
                />

                <g id="destination-group" opacity="0">
                  <path id="beam-slot" d="M 690 278 H 950" fill="none" stroke="#c7c7c7" stroke-width="6" stroke-linecap="round" />
                  <path d="M 742 278 V 330" fill="none" stroke="#cdcdcd" stroke-width="4" stroke-linecap="round" />
                  <path d="M 898 278 V 330" fill="none" stroke="#cdcdcd" stroke-width="4" stroke-linecap="round" />
                  <circle cx="742" cy="330" r="38" fill="none" stroke="#d4d4d4" stroke-width="4" />
                  <circle cx="898" cy="330" r="38" fill="none" stroke="#d4d4d4" stroke-width="4" />
                  <path d="M 820 372 V 594" fill="none" stroke="#d0d0d0" stroke-width="4" stroke-linecap="round" />
                  <path d="M 756 594 H 884" fill="none" stroke="#d0d0d0" stroke-width="4" stroke-linecap="round" />
                </g>

                <path
                  id="search-guide-a"
                  d="M 552 454 C 604 426, 638 406, 670 392"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-dasharray="8 12"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 670 392 C 728 356, 776 330, 820 334"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-dasharray="8 12"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 820 334 C 864 338, 916 360, 968 392"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-dasharray="8 12"
                  stroke-linecap="round"
                  opacity="0"
                />

                <g id="candidate-a" opacity="0">
                  <path data-stroke d="M -54 -24 H 18" fill="none" stroke="#b5b5b5" stroke-width="5" stroke-linecap="round" />
                  <path data-stroke d="M -26 -24 V 18" fill="none" stroke="#b5b5b5" stroke-width="4" stroke-linecap="round" />
                  <circle data-stroke cx="16" cy="18" r="26" fill="none" stroke="#b5b5b5" stroke-width="4" />
                  <path data-stroke d="M 16 44 V 88" fill="none" stroke="#b5b5b5" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="candidate-b" opacity="0">
                  <path data-stroke d="M -62 -18 H 62" fill="none" stroke="#b5b5b5" stroke-width="5" stroke-linecap="round" />
                  <circle data-stroke cx="-26" cy="20" r="24" fill="none" stroke="#b5b5b5" stroke-width="4" />
                  <circle data-stroke cx="26" cy="20" r="24" fill="none" stroke="#b5b5b5" stroke-width="4" />
                  <path data-stroke d="M 0 44 V 96" fill="none" stroke="#b5b5b5" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="candidate-c" opacity="0">
                  <path data-stroke d="M -18 -24 H 54" fill="none" stroke="#b5b5b5" stroke-width="5" stroke-linecap="round" />
                  <circle data-stroke cx="-18" cy="18" r="26" fill="none" stroke="#b5b5b5" stroke-width="4" />
                  <path data-stroke d="M 12 18 H 54" fill="none" stroke="#b5b5b5" stroke-width="4" stroke-linecap="round" />
                  <path data-stroke d="M 18 44 V 88" fill="none" stroke="#b5b5b5" stroke-width="4" stroke-linecap="round" />
                </g>
                <circle id="search-echo-a" cx="702" cy="330" r="8" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-b" cx="820" cy="286" r="8" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-c" cx="938" cy="330" r="8" fill="#9e1b32" opacity="0" />

                <circle id="pressure-halo" cx="820" cy="438" r="118" fill="url(#dot-halo-gradient)" opacity="0" />
                <circle id="pressure-left" cx="770" cy="394" r="42" fill="none" stroke="#c7c7c7" stroke-width="5" opacity="0" />
                <circle id="pressure-right" cx="870" cy="394" r="42" fill="none" stroke="#c7c7c7" stroke-width="5" opacity="0" />
                <path
                  id="pressure-top"
                  d="M 730 306 H 910"
                  fill="none"
                  stroke="#c7c7c7"
                  stroke-width="6"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="tension-guide"
                  d="M 790 378 V 492 M 850 378 V 492"
                  fill="none"
                  stroke="#b5b5b5"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="6 10"
                  opacity="0"
                />

                <g id="pulley-group" opacity="0">
                  <path id="beam-top" d="M 690 278 H 950" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" opacity="0" />
                  <path id="beam-left-drop" d="M 742 278 V 330" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" opacity="0" />
                  <path id="beam-right-drop" d="M 898 278 V 330" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" opacity="0" />
                  <circle id="pulley-left-outer" cx="742" cy="330" r="38" fill="none" stroke="#4f4f4f" stroke-width="5" opacity="0" />
                  <circle id="pulley-left-inner" cx="742" cy="330" r="11" fill="none" stroke="#8a8a8a" stroke-width="4" opacity="0" />
                  <circle id="pulley-right-outer" cx="898" cy="330" r="38" fill="none" stroke="#4f4f4f" stroke-width="5" opacity="0" />
                  <circle id="pulley-right-inner" cx="898" cy="330" r="11" fill="none" stroke="#8a8a8a" stroke-width="4" opacity="0" />
                  <path id="hanging-cable" d="M 820 372 V 592" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" opacity="0" />
                  <path id="lower-bar" d="M 756 592 H 884" fill="none" stroke="#4f4f4f" stroke-width="4" stroke-linecap="round" opacity="0" />
                  <path id="lower-left-return" d="M 742 368 V 548" fill="none" stroke="#8a8a8a" stroke-width="4" stroke-linecap="round" opacity="0" />
                  <path id="lower-right-return" d="M 898 368 V 548" fill="none" stroke="#8a8a8a" stroke-width="4" stroke-linecap="round" opacity="0" />
                  <circle id="resolution-halo" cx="820" cy="468" r="134" fill="none" stroke="#ffccd5" stroke-width="4" opacity="0" />
                </g>

                <path
                  id="trace-center-up"
                  d="M 820 438 L 820 336"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="trace-left"
                  d="M 820 336 C 794 336, 770 336, 742 330"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="trace-right"
                  d="M 820 336 C 846 336, 870 336, 898 330"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="trace-drop"
                  d="M 820 336 L 820 500"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  opacity="0"
                />

                <circle id="dot-halo" cx="292" cy="454" r="74" fill="url(#dot-halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="292" cy="454" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
