<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Thread SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot thread visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot thread narrative</title>
            <desc id="stage-desc">
              A single red point arrives in a quiet field, tests three candidate forms, is squeezed
              through a narrow throat, becomes a thread that stitches three calm structures together,
              then settles into one resolved woven system.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="52%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="76%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.16" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="panel-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.9" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.9" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
              <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.05" />
              </filter>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="820" cy="448" rx="708" ry="308" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1088" cy="272" rx="216" ry="142" fill="#ffccd5" opacity="0.11" />
            <ellipse cx="492" cy="638" rx="188" ry="124" fill="#ffffff" opacity="0.48" />

            <g id="layout-root">
              <rect
                x="98"
                y="114"
                width="1404"
                height="672"
                fill="#ffffff"
                opacity="0.62"
                stroke="#e7e7e7"
                stroke-width="1.5"
                filter="url(#soft-shadow)"
              />
              <rect x="126" y="178" width="1348" height="544" fill="url(#panel-fade)" opacity="0.92" />
              <rect x="174" y="214" width="1252" height="472" fill="#ffffff" opacity="0.22" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 188 252 H 1412" />
                <path d="M 188 450 H 1412" />
                <path d="M 188 648 H 1412" />
                <path d="M 320 214 V 686" />
                <path d="M 800 214 V 686" />
                <path d="M 1280 214 V 686" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 320 450 C 448 450, 594 450, 744 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 320 450 C 448 450, 594 450, 744 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 566 450 C 582 398, 614 350, 646 314"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 646 314 C 720 248, 776 236, 824 258"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 824 258 C 936 268, 1002 324, 1044 428"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-a" opacity="0">
                  <rect x="-74" y="-54" width="148" height="108" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -30 -10 H 34" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -42 22 H 18" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="candidate-b" opacity="0">
                  <circle cx="0" cy="0" r="62" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <circle cx="0" cy="0" r="36" fill="none" stroke="#9e1b32" stroke-width="7" />
                  <path d="M -24 32 H 24" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="candidate-c" opacity="0">
                  <rect x="-46" y="-96" width="92" height="192" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M 0 -54 V 56" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -18 74 H 18" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <line id="loom-line-a" x1="700" y1="300" x2="956" y2="600" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0" />
                <line id="loom-line-b" x1="700" y1="600" x2="956" y2="300" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0" />

                <circle id="gate-halo" cx="824" cy="450" r="104" fill="url(#halo-gradient)" opacity="0" />
                <circle id="gate-shell" cx="824" cy="450" r="62" fill="none" stroke="#ffccd5" stroke-width="4" opacity="0" />
                <g id="gate-left" opacity="0">
                  <path d="M -22 -118 H 0 M -22 -118 V 118 M -22 118 H 0" fill="none" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" />
                </g>
                <g id="gate-right" opacity="0">
                  <path d="M 22 -118 H 0 M 22 -118 V 118 M 22 118 H 0" fill="none" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" />
                </g>

                <path
                  id="thread-base"
                  d="M 824 450
                    C 786 408, 724 354, 646 320
                    C 606 304, 580 314, 572 344
                    C 560 388, 602 428, 682 438
                    C 780 448, 906 432, 1038 398
                    C 1082 388, 1110 380, 1120 390
                    C 1104 332, 1052 300, 974 312
                    C 904 324, 852 392, 824 450
                    C 804 520, 784 608, 706 648
                    C 662 670, 626 640, 628 598
                    C 632 556, 690 512, 776 486
                    C 808 476, 820 464, 824 450"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 12"
                  opacity="0"
                />
                <path
                  id="thread-active"
                  d="M 824 450
                    C 786 408, 724 354, 646 320
                    C 606 304, 580 314, 572 344
                    C 560 388, 602 428, 682 438
                    C 780 448, 906 432, 1038 398
                    C 1082 388, 1110 380, 1120 390
                    C 1104 332, 1052 300, 974 312
                    C 904 324, 852 392, 824 450
                    C 804 520, 784 608, 706 648
                    C 662 670, 626 640, 628 598
                    C 632 556, 690 512, 776 486
                    C 808 476, 820 464, 824 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 2400"
                  opacity="0"
                />

                <g id="slot-a" opacity="0">
                  <path d="M -72 -46 H -44 M -72 -46 V -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 72 -46 H 44 M 72 -46 V -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -72 46 H -44 M -72 46 V 18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 72 46 H 44 M 72 46 V 18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="slot-b" opacity="0">
                  <path d="M -80 -46 H -50 M -80 -46 V -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 80 -46 H 50 M 80 -46 V -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -80 46 H -50 M -80 46 V 18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 80 46 H 50 M 80 46 V 18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="slot-c" opacity="0">
                  <path d="M -72 -46 H -44 M -72 -46 V -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 72 -46 H 44 M 72 -46 V -18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -72 46 H -44 M -72 46 V 18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 72 46 H 44 M 72 46 V 18" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="card-a" opacity="0">
                  <rect x="-78" y="-48" width="156" height="96" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -38 -8 H 38" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -50 24 H 18" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="card-b" opacity="0">
                  <rect x="-86" y="-48" width="172" height="96" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -44 -8 H 44" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -56 24 H 22" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="card-c" opacity="0">
                  <rect x="-78" y="-48" width="156" height="96" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -34 -8 H 34" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -46 24 H 20" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <circle id="resolution-halo" cx="824" cy="450" r="136" fill="url(#halo-gradient)" opacity="0" />
                <circle id="resolution-ring" cx="824" cy="450" r="86" fill="none" stroke="#9e1b32" stroke-width="5" opacity="0" />
                <path
                  id="memory-arc"
                  d="M 668 426 C 732 336, 926 332, 1008 430 C 1074 512, 1012 620, 896 640"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="10 12"
                  opacity="0"
                />

                <circle id="dot-halo" cx="320" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="320" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
