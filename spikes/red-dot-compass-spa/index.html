<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Compass SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot compass visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot compass narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests several direction grammars, gets
              squeezed between competing axes, then resolves into a compact compass-like emblem.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="52%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="78%" stop-color="#ffffff" stop-opacity="0.3" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.9" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.9" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="808" cy="450" rx="720" ry="316" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1132" cy="278" rx="196" ry="126" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="470" cy="646" rx="218" ry="132" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect x="104" y="114" width="1392" height="672" fill="#ffffff" opacity="0.6" stroke="none" />
              <rect x="132" y="178" width="1336" height="544" fill="url(#plate-fade)" opacity="0.92" />
              <rect x="182" y="216" width="1236" height="468" fill="#ffffff" opacity="0.2" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 198 252 H 1402" />
                <path d="M 198 450 H 1402" />
                <path d="M 198 648 H 1402" />
                <path d="M 344 216 V 684" />
                <path d="M 800 216 V 684" />
                <path d="M 1256 216 V 684" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 304 450 C 430 450, 572 450, 748 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 304 450 C 430 450, 572 450, 748 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 560 450 C 588 422, 616 388, 648 352"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 648 352 C 724 326, 776 314, 820 320"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 820 320 C 914 332, 960 354, 1002 388"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-arc" opacity="0">
                  <path d="M -64 28 Q 0 -54 64 28" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                  <path d="M -18 18 L 18 -26" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -40 44 H 8" fill="none" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <g id="candidate-cross" opacity="0">
                  <circle cx="0" cy="0" r="50" fill="none" stroke="#cfcfcf" stroke-width="5" />
                  <path d="M 0 -62 V 62" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -44 0 H 44" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" />
                </g>

                <g id="candidate-fan" opacity="0">
                  <path d="M -56 38 L -4 -28 L 56 10" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M -22 14 L 24 -20" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -50 44 H 6" fill="none" stroke="#cfcfcf" stroke-width="6" stroke-linecap="round" />
                </g>

                <path
                  id="meridian-spine"
                  d="M 820 278 V 622"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="horizon-left"
                  d="M 646 450 H 762"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="horizon-right"
                  d="M 878 450 H 994"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="meridian-top"
                  d="M -26 -44 H 0 V 0 H 26"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <path
                  id="meridian-bottom"
                  d="M -26 -44 H 0 V 0 H 26"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="5"
                  stroke-linecap="round"
                  opacity="0"
                />
                <circle id="tension-halo" cx="820" cy="450" r="118" fill="url(#halo-gradient)" opacity="0" />

                <path
                  id="rose-base"
                  d="M 820 450 L 820 312 Q 892 328 964 450 Q 892 572 820 588 Q 748 572 676 450 Q 748 328 820 312 Q 820 380 820 450"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 12"
                  opacity="0"
                />
                <path
                  id="rose-active"
                  d="M 820 450 L 820 312 Q 892 328 964 450 Q 892 572 820 588 Q 748 572 676 450 Q 748 328 820 312 Q 820 380 820 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 2400"
                  opacity="0"
                />

                <g id="slot-north" opacity="0">
                  <path d="M -60 -38 H -34 M -60 -38 V -12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 60 -38 H 34 M 60 -38 V -12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -60 38 H -34 M -60 38 V 12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 60 38 H 34 M 60 38 V 12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-east" opacity="0">
                  <path d="M -52 -34 H -26 M -52 -34 V -10" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 52 -34 H 26 M 52 -34 V -10" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -52 34 H -26 M -52 34 V 10" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 52 34 H 26 M 52 34 V 10" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-south" opacity="0">
                  <path d="M -60 -38 H -34 M -60 -38 V -12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 60 -38 H 34 M 60 -38 V -12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -60 38 H -34 M -60 38 V 12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 60 38 H 34 M 60 38 V 12" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>
                <g id="slot-west" opacity="0">
                  <path d="M -52 -34 H -26 M -52 -34 V -10" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 52 -34 H 26 M 52 -34 V -10" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M -52 34 H -26 M -52 34 V 10" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                  <path d="M 52 34 H 26 M 52 34 V 10" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" />
                </g>

                <g id="vane-north" opacity="0">
                  <path d="M 0 -56 L 20 -12 L 0 18 L -20 -12 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path d="M 0 24 V -26" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                </g>
                <g id="vane-east" opacity="0">
                  <path d="M -20 -16 L 22 0 L -20 16 L -4 0 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path d="M -24 0 H 8" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <g id="vane-south" opacity="0">
                  <path d="M 0 -18 L 16 8 L 0 42 L -16 8 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path d="M 0 -2 V 24" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <g id="vane-west" opacity="0">
                  <path d="M 20 -16 L -22 0 L 20 16 L 4 0 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path d="M 24 0 H -8" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <path
                  id="memory-axis"
                  d="M 820 356 V 544 M 726 450 H 914"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="10 12"
                  opacity="0"
                />
                <circle id="resolution-halo" cx="820" cy="450" r="146" fill="url(#halo-gradient)" opacity="0" />
                <circle id="resolution-ring" cx="820" cy="450" r="88" fill="none" stroke="#9e1b32" stroke-width="5" opacity="0" />

                <circle id="dot-halo" cx="304" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="304" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
