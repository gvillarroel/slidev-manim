<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Keystone SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot keystone visual narrative">
        <div class="stage-frame" tabindex="0">
          <p id="phase-status" class="sr-only" aria-live="polite">appearance</p>
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid slice"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot keystone narrative</title>
            <desc id="stage-desc">
              A single red point appears, tests three pocket-like structures, gets compressed in a
              receiving cavity, then traces a keystone lock system that settles into a calm
              centered emblem.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <linearGradient id="field-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
                <stop offset="18%" stop-color="#f7f7f7" stop-opacity="1" />
                <stop offset="82%" stop-color="#f7f7f7" stop-opacity="1" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </linearGradient>
              <radialGradient id="field-glow" cx="54%" cy="50%" r="44%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.97" />
                <stop offset="62%" stop-color="#ffffff" stop-opacity="0.3" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="dot-halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.78" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.16" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.08" />
              </filter>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <g id="layout-root">
              <rect
                x="92"
                y="94"
                width="1416"
                height="712"
                fill="#ffffff"
                opacity="0.62"
                stroke="#e7e7e7"
                stroke-width="1.5"
                filter="url(#soft-shadow)"
              />
              <rect x="114" y="160" width="1372" height="580" fill="url(#field-fade)" opacity="0.84" />
              <ellipse cx="844" cy="452" rx="686" ry="304" fill="url(#field-glow)" opacity="0.92" />
              <rect x="182" y="206" width="1236" height="488" fill="#ffffff" opacity="0.24" />

              <g id="ambient-grid" opacity="0.11" stroke="#cfcfcf" stroke-width="1">
                <path d="M 180 224 H 1420" />
                <path d="M 180 450 H 1420" />
                <path d="M 180 676 H 1420" />
                <path d="M 332 202 V 700" />
                <path d="M 800 200 V 700" />
                <path d="M 1268 202 V 700" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 306 452 C 410 452, 486 452, 560 410 C 644 360, 718 320, 792 332 C 860 344, 896 390, 872 452 C 846 520, 760 564, 676 552 C 744 548, 818 520, 904 452"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 306 452 C 410 452, 486 452, 560 410 C 644 360, 718 320, 792 332 C 860 344, 896 390, 872 452 C 846 520, 760 564, 676 552 C 744 548, 818 520, 904 452"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <g id="search-group">
                  <path
                    id="guide-a"
                    d="M 350 452 C 416 442, 468 418, 524 360"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="3"
                    stroke-dasharray="8 12"
                    opacity="0"
                  />
                  <path
                    id="guide-b"
                    d="M 524 360 C 606 334, 684 314, 760 330"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="3"
                    stroke-dasharray="8 12"
                    opacity="0"
                  />
                  <path
                    id="guide-c"
                    d="M 760 330 C 736 420, 694 500, 628 566"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="3"
                    stroke-dasharray="8 12"
                    opacity="0"
                  />
                  <path
                    id="guide-d"
                    d="M 628 566 C 714 550, 800 512, 860 452"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="3"
                    stroke-dasharray="8 12"
                    opacity="0"
                  />

                  <g id="candidate-arch" opacity="0">
                    <path
                      d="M -72 28 C -58 -18, -24 -58, 0 -68 C 24 -58, 58 -18, 72 28"
                      fill="none"
                      stroke="#b5b5b5"
                      stroke-width="6"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path d="M -44 28 H 44" fill="none" stroke="#d6d6d6" stroke-width="4" stroke-linecap="round" />
                  </g>

                  <g id="candidate-notch" opacity="0">
                    <path
                      d="M -86 28 L -34 -42 L 0 -10 L 34 -42 L 86 28"
                      fill="none"
                      stroke="#b5b5b5"
                      stroke-width="6"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path d="M -44 28 H 44" fill="none" stroke="#d6d6d6" stroke-width="4" stroke-linecap="round" />
                  </g>

                  <g id="candidate-cradle" opacity="0">
                    <path
                      d="M -74 -24 V 34 H -20 L 0 8 L 20 34 H 74 V -24"
                      fill="none"
                      stroke="#b5b5b5"
                      stroke-width="6"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </g>
                </g>

                <g id="tension-group" opacity="0">
                  <ellipse id="pocket-halo" cx="860" cy="452" rx="164" ry="122" fill="#ffccd5" opacity="0" />
                  <polygon id="pocket-left" points="-172,78 -74,78 -40,-22 -124,-22" fill="#333e48" opacity="0.96" />
                  <polygon id="pocket-right" points="172,78 74,78 40,-22 124,-22" fill="#333e48" opacity="0.96" />
                  <polygon id="pocket-cap" points="-92,-154 92,-154 50,-56 -50,-56" fill="#333e48" opacity="0.96" />
                  <path
                    id="pocket-slot"
                    d="M 770 392 L 820 336 L 870 392"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    opacity="0.52"
                  />
                  <path
                    id="pocket-base"
                    d="M 744 560 H 976"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="5"
                    stroke-linecap="round"
                    opacity="0.5"
                  />
                </g>

                <g id="lock-group" opacity="0">
                  <path
                    id="trace-left-base"
                    d="M 820 318 C 774 320, 724 352, 692 420"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="5"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <path
                    id="trace-right-base"
                    d="M 820 318 C 866 320, 916 352, 948 420"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="5"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <path
                    id="trace-left-active"
                    d="M 820 318 C 774 320, 724 352, 692 420"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <path
                    id="trace-right-active"
                    d="M 820 318 C 866 320, 916 352, 948 420"
                    fill="none"
                    stroke="#9e1b32"
                    stroke-width="8"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <path
                    id="memory-arch"
                    d="M 650 516 C 708 390, 762 286, 820 248 C 878 286, 932 390, 990 516"
                    fill="none"
                    stroke="#d6d6d6"
                    stroke-width="4"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <rect id="support-left" x="614" y="406" width="156" height="96" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" opacity="0" />
                  <rect id="support-right" x="870" y="406" width="156" height="96" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" opacity="0" />
                  <polygon
                    id="support-cap"
                    points="748,308 892,308 850,238 790,238"
                    fill="#ffffff"
                    stroke="#4f4f4f"
                    stroke-width="5"
                    stroke-linejoin="round"
                    opacity="0"
                  />
                  <path
                    id="support-base"
                    d="M 714 576 H 926"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="6"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <path
                    id="support-left-rule"
                    d="M 650 452 H 726"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="5"
                    stroke-linecap="round"
                    opacity="0"
                  />
                  <path
                    id="support-right-rule"
                    d="M 910 452 H 986"
                    fill="none"
                    stroke="#cfcfcf"
                    stroke-width="5"
                    stroke-linecap="round"
                    opacity="0"
                  />
                </g>

                <g id="resolution-group" opacity="0">
                  <circle id="resolution-ring" cx="820" cy="452" r="92" fill="none" stroke="#9e1b32" stroke-width="6" opacity="0" />
                  <circle id="resolution-aura" cx="820" cy="452" r="152" fill="none" stroke="#ffccd5" stroke-width="4" opacity="0" />
                </g>

                <circle id="dot-halo" cx="306" cy="452" r="76" fill="url(#dot-halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="306" cy="452" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
