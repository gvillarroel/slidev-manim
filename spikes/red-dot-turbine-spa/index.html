<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Turbine SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot turbine visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot turbine narrative</title>
            <desc id="stage-desc">
              A single red point arrives through a quiet lane, tests three vane structures, compresses through a
              rotational throat, and resolves into a calm turbine-like hub.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fbfbfb" />
                <stop offset="100%" stop-color="#f2f2f2" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="50%" r="52%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="78%" stop-color="#ffffff" stop-opacity="0.32" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.86" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.16" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="12%" stop-color="#ffffff" stop-opacity="0.95" />
                <stop offset="88%" stop-color="#ffffff" stop-opacity="0.95" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="808" cy="450" rx="728" ry="326" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1142" cy="280" rx="244" ry="156" fill="#ffccd5" opacity="0.07" />
            <ellipse cx="436" cy="650" rx="252" ry="154" fill="#ffffff" opacity="0.38" />

            <g id="layout-root">
              <rect x="108" y="110" width="1384" height="680" fill="#ffffff" opacity="0.58" />
              <rect x="146" y="182" width="1308" height="536" fill="url(#plate-fade)" opacity="0.94" />
              <rect x="206" y="222" width="1188" height="456" fill="#ffffff" opacity="0.18" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 220 256 H 1380" />
                <path d="M 220 450 H 1380" />
                <path d="M 220 644 H 1380" />
                <path d="M 360 222 V 678" />
                <path d="M 800 222 V 678" />
                <path d="M 1240 222 V 678" />
              </g>

              <g id="scene-root">
                <path
                  id="entry-lane"
                  d="M 290 450 C 404 450, 514 450, 644 450"
                  fill="none"
                  stroke="#d6d6d6"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 290 450 C 404 450, 514 450, 644 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <circle id="hub-guide" cx="850" cy="450" r="78" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-dasharray="9 13" opacity="0" />
                <path id="hub-axis" d="M 850 336 V 564" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" stroke-dasharray="9 13" opacity="0" />
                <path id="hub-cross" d="M 736 450 H 964" fill="none" stroke="#e1e1e1" stroke-width="3" stroke-linecap="round" stroke-dasharray="9 13" opacity="0" />

                <path id="search-arc-top" d="M 628 450 C 662 406, 696 362, 734 328" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-mid" d="M 648 450 C 714 438, 770 422, 840 392" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-bottom" d="M 628 450 C 664 494, 700 538, 734 572" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 12" opacity="0" />

                <g id="candidate-top" opacity="0">
                  <path d="M -62 46 L -8 -52 L 52 -22" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M -18 12 L 22 -54" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -72 60 L 52 60" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>

                <g id="candidate-mid" opacity="0">
                  <path d="M -68 34 L 0 -18 L 68 34" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M 0 -18 V 62" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -58 70 H 58" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>

                <g id="candidate-bottom" opacity="0">
                  <path d="M -52 -20 L 12 -50 L 64 46" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M -12 6 L 34 54" fill="none" stroke="#9e1b32" stroke-width="8" stroke-linecap="round" />
                  <path d="M -62 -36 L 52 -36" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>

                <circle id="echo-top" cx="734" cy="328" r="52" fill="none" stroke="#cfcfcf" stroke-width="3" opacity="0" />
                <circle id="echo-mid" cx="848" cy="392" r="46" fill="none" stroke="#cfcfcf" stroke-width="3" opacity="0" />
                <circle id="echo-bottom" cx="734" cy="572" r="52" fill="none" stroke="#cfcfcf" stroke-width="3" opacity="0" />

                <path id="throat-axis" d="M 872 318 V 582" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14" opacity="0" />
                <g id="throat-left" opacity="0">
                  <path d="M -156 0 H -42" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" />
                  <path d="M -142 92 L -18 -8 L -142 -108" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path d="M -72 52 L -18 -8" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <g id="throat-right" opacity="0">
                  <path d="M 156 0 H 42" fill="none" stroke="#4f4f4f" stroke-width="6" stroke-linecap="round" />
                  <path d="M 142 -92 L 18 8 L 142 108" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path d="M 72 -52 L 18 8" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>
                <path id="throat-brace-top" d="M 806 342 H 938" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" opacity="0" />
                <path id="throat-brace-bottom" d="M 806 558 H 938" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" opacity="0" />
                <circle id="pressure-halo" cx="872" cy="450" r="120" fill="url(#halo-gradient)" opacity="0" />

                <g id="turbine-group" opacity="0">
                  <path id="trace-top" d="M 850 450 C 816 430, 788 390, 772 340 C 770 314, 792 286, 828 266" fill="none" stroke="#9e1b32" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0 1200" opacity="0" />
                  <path id="trace-right" d="M 850 450 C 894 428, 944 418, 998 426 C 1022 438, 1038 470, 1034 512" fill="none" stroke="#9e1b32" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0 1200" opacity="0" />
                  <path id="trace-bottom" d="M 850 450 C 824 482, 802 520, 798 566 C 808 592, 838 612, 876 618" fill="none" stroke="#9e1b32" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0 1200" opacity="0" />

                  <path id="blade-top" d="M 850 450 C 814 428, 786 390, 772 340 C 768 322, 782 296, 816 278 C 826 324, 840 370, 874 420 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path id="blade-right" d="M 850 450 C 894 428, 944 418, 998 426 C 1018 432, 1032 458, 1028 494 C 982 486, 934 478, 882 468 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />
                  <path id="blade-bottom" d="M 850 450 C 824 482, 802 520, 798 566 C 804 586, 830 604, 866 608 C 872 560, 872 516, 860 472 Z" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" stroke-linejoin="round" />

                  <path id="inner-top" d="M 840 412 C 824 392, 810 360, 806 330" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0" />
                  <path id="inner-right" d="M 886 442 C 918 438, 954 440, 984 452" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0" />
                  <path id="inner-bottom" d="M 842 492 C 834 524, 834 556, 844 584" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0" />

                  <circle id="hub-shell" cx="850" cy="450" r="84" fill="none" stroke="#4f4f4f" stroke-width="5" opacity="0" />
                  <circle id="hub-ring" cx="850" cy="450" r="58" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-dasharray="10 14" opacity="0" />
                  <path id="outer-arc-top" d="M 730 350 Q 850 248 970 350" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" opacity="0" />
                  <path id="outer-arc-bottom" d="M 760 586 Q 850 654 940 586" fill="none" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" opacity="0" />
                  <g id="resolution-brackets" opacity="0" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" fill="none">
                    <path d="M 696 332 H 738 M 696 332 V 374" />
                    <path d="M 1004 332 H 962 M 1004 332 V 374" />
                    <path d="M 726 568 H 684 M 684 568 V 526" />
                  </g>
                  <circle id="resolution-halo" cx="850" cy="450" r="154" fill="url(#halo-gradient)" opacity="0" />
                </g>

                <circle id="dot-halo" cx="290" cy="450" r="80" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="290" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
