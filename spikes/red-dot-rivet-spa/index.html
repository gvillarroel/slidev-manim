<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Rivet SPA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot rivet visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot rivet narrative</title>
            <desc id="stage-desc">
              A single red point enters a quiet field, tests several joining grammars, gets compressed inside a four-piece
              joint, then resolves into a calm centered rivet-like fastener.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f1f1f1" />
              </linearGradient>
              <radialGradient id="field-glow" cx="50%" cy="48%" r="48%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="78%" stop-color="#ffffff" stop-opacity="0.34" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.88" />
                <stop offset="72%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <linearGradient id="plate-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.94" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="url(#stage-wash)" />
            <ellipse cx="812" cy="448" rx="710" ry="316" fill="url(#field-glow)" opacity="0.96" />
            <ellipse cx="1092" cy="260" rx="236" ry="152" fill="#ffccd5" opacity="0.08" />
            <ellipse cx="470" cy="654" rx="304" ry="180" fill="#ffffff" opacity="0.42" />

            <g id="layout-root">
              <rect x="108" y="110" width="1384" height="680" fill="#ffffff" opacity="0.56" />
              <rect x="142" y="180" width="1316" height="540" fill="url(#plate-fade)" opacity="0.94" />
              <rect x="198" y="220" width="1204" height="460" fill="#ffffff" opacity="0.18" />

              <g id="ambient-grid" opacity="0.1" stroke="#cfcfcf" stroke-width="1">
                <path d="M 214 252 H 1386" />
                <path d="M 214 450 H 1386" />
                <path d="M 214 648 H 1386" />
                <path d="M 370 220 V 680" />
                <path d="M 800 220 V 680" />
                <path d="M 1230 220 V 680" />
              </g>

              <g id="scene-root">
                <path
                  id="narrative-spine"
                  d="M 304 450 C 432 450, 578 450, 758 450"
                  fill="none"
                  stroke="#d8d8d8"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="8 14"
                  opacity="0"
                />
                <path
                  id="active-trail"
                  d="M 304 450 C 432 450, 578 450, 758 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="9"
                  stroke-linecap="round"
                  stroke-dasharray="0 1200"
                  opacity="0"
                />

                <path
                  id="search-guide-a"
                  d="M 566 450 C 598 426, 622 406, 644 390"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-b"
                  d="M 644 390 C 720 346, 774 324, 832 336"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />
                <path
                  id="search-guide-c"
                  d="M 832 336 C 902 342, 958 368, 1006 394"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="8 12"
                  opacity="0"
                />

                <g id="candidate-lap" opacity="0">
                  <rect x="-82" y="-28" width="102" height="22" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <rect x="-18" y="6" width="102" height="22" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -12 0 H 22" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-brace" opacity="0">
                  <path
                    d="M -72 40 L -16 -18 H 20 L 72 -72"
                    fill="none"
                    stroke="#4f4f4f"
                    stroke-width="22"
                    stroke-linecap="square"
                    stroke-linejoin="miter"
                  />
                  <path
                    d="M -72 -72 L -20 -20 H 16 L 72 40"
                    fill="none"
                    stroke="#ffffff"
                    stroke-width="12"
                    stroke-linecap="square"
                    stroke-linejoin="miter"
                  />
                  <path d="M -16 -16 H 16" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <g id="candidate-rivet" opacity="0">
                  <rect x="-86" y="-16" width="58" height="32" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <rect x="28" y="-16" width="58" height="32" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <rect x="-16" y="-86" width="32" height="58" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <rect x="-16" y="28" width="32" height="58" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                  <circle cx="0" cy="0" r="24" fill="none" stroke="#4f4f4f" stroke-width="5" />
                  <path d="M -14 0 H 14" fill="none" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                </g>

                <circle
                  id="socket-guide"
                  cx="820"
                  cy="450"
                  r="72"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <circle id="pressure-halo" cx="820" cy="450" r="128" fill="url(#halo-gradient)" opacity="0" />

                <g id="plate-left" opacity="0">
                  <rect x="-184" y="-34" width="160" height="68" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="plate-right" opacity="0">
                  <rect x="24" y="-34" width="160" height="68" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="strap-top" opacity="0">
                  <rect x="-56" y="-184" width="112" height="160" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="strap-bottom" opacity="0">
                  <rect x="-56" y="24" width="112" height="160" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>

                <path
                  id="memory-cross"
                  d="M 608 450 H 1032 M 820 238 V 662"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-dasharray="10 14"
                  opacity="0"
                />
                <path
                  id="lock-route-base"
                  d="M 820 450 L 820 392 A 58 58 0 1 1 819.9 392 L 820 450"
                  fill="none"
                  stroke="#cfcfcf"
                  stroke-width="4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="10 12"
                  opacity="0"
                />
                <path
                  id="lock-route-active"
                  d="M 820 450 L 820 392 A 58 58 0 1 1 819.9 392 L 820 450"
                  fill="none"
                  stroke="#9e1b32"
                  stroke-width="10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-dasharray="0 1800"
                  opacity="0"
                />
                <circle id="rivet-ring" cx="820" cy="450" r="58" fill="none" stroke="#4f4f4f" stroke-width="5" opacity="0" />

                <g id="slot-north" opacity="0" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" fill="none">
                  <path d="M -30 -18 H -8 M 30 -18 H 8 M -22 18 V -6 M 22 18 V -6" />
                </g>
                <g id="slot-east" opacity="0" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" fill="none">
                  <path d="M 18 -30 V -8 M 18 30 V 8 M -18 -22 H 6 M -18 22 H 6" />
                </g>
                <g id="slot-south" opacity="0" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" fill="none">
                  <path d="M -30 18 H -8 M 30 18 H 8 M -22 -18 V 6 M 22 -18 V 6" />
                </g>
                <g id="slot-west" opacity="0" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" fill="none">
                  <path d="M -18 -30 V -8 M -18 30 V 8 M 18 -22 H -6 M 18 22 H -6" />
                </g>

                <g id="tab-north" opacity="0">
                  <rect x="-26" y="-14" width="52" height="18" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="tab-east" opacity="0">
                  <rect x="-4" y="-26" width="18" height="52" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="tab-south" opacity="0">
                  <rect x="-26" y="-4" width="52" height="18" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>
                <g id="tab-west" opacity="0">
                  <rect x="-14" y="-26" width="18" height="52" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                </g>

                <circle id="resolution-halo" cx="820" cy="450" r="176" fill="url(#halo-gradient)" opacity="0" />
                <g id="resolution-frame" opacity="0" stroke="#9e1b32" stroke-width="5" stroke-linecap="round" fill="none">
                  <path d="M 676 326 H 718 M 676 326 V 368" />
                  <path d="M 964 326 H 922 M 964 326 V 368" />
                  <path d="M 676 574 H 718 M 676 574 V 532" />
                  <path d="M 964 574 H 922 M 964 574 V 532" />
                </g>

                <circle id="dot-halo" cx="304" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
                <circle id="dot-core" cx="304" cy="450" r="18" fill="#9e1b32" opacity="0" />
              </g>
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
