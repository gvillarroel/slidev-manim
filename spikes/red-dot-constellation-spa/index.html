<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Dot Constellation SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Red dot visual narrative">
        <div class="stage-frame" tabindex="0">
          <svg
            id="stage"
            class="stage"
            viewBox="0 0 1600 900"
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-labelledby="stage-title stage-desc"
          >
            <title id="stage-title">Red dot constellation narrative</title>
            <desc id="stage-desc">
              A single red point appears, probes several incomplete forms, survives a narrow
              pressure gate, becomes a hub, and resolves as a centered constellation.
            </desc>

            <defs>
              <linearGradient id="stage-wash" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fcfcfc" />
                <stop offset="100%" stop-color="#f1f1f1" />
              </linearGradient>
              <linearGradient id="panel-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
                <stop offset="14%" stop-color="#ffffff" stop-opacity="0.84" />
                <stop offset="86%" stop-color="#ffffff" stop-opacity="0.84" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
              </linearGradient>
              <radialGradient id="field-glow" cx="51%" cy="52%" r="44%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
                <stop offset="70%" stop-color="#ffffff" stop-opacity="0.32" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="halo-gradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffccd5" stop-opacity="0.82" />
                <stop offset="68%" stop-color="#ffccd5" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffccd5" stop-opacity="0" />
              </radialGradient>
              <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.08" />
              </filter>
            </defs>

            <rect x="0" y="0" width="1600" height="900" fill="#ffffff" />
            <ellipse cx="784" cy="438" rx="676" ry="288" fill="url(#field-glow)" opacity="0.54" />
            <ellipse cx="1136" cy="458" rx="276" ry="218" fill="#ffccd5" opacity="0.06" />

            <g id="ambient-grid" opacity="0.08" stroke="#cfcfcf" stroke-width="1">
              <path d="M 196 230 H 1404" />
              <path d="M 196 470 H 1404" />
              <path d="M 196 670 H 1404" />
              <path d="M 420 210 V 690" />
              <path d="M 820 210 V 690" />
              <path d="M 1180 210 V 690" />
            </g>

            <g id="scene-root">
              <path
                id="narrative-spine"
                d="M 430 450 C 462 430, 488 372, 520 300 C 580 330, 622 372, 660 420 C 628 498, 594 548, 560 612 C 652 560, 714 504, 760 470 C 808 470, 836 470, 860 470 C 906 470, 938 466, 960 470 C 996 464, 1030 456, 1060 450 C 990 450, 918 450, 820 450"
                fill="none"
                stroke="#d8d8d8"
                stroke-width="4"
                stroke-linecap="round"
                stroke-dasharray="6 14"
                opacity="0"
              />
              <path
                id="active-trail"
                d="M 430 450 C 462 430, 488 372, 520 300 C 580 330, 622 372, 660 420 C 628 498, 594 548, 560 612 C 652 560, 714 504, 760 470 C 808 470, 836 470, 860 470 C 906 470, 938 466, 960 470 C 996 464, 1030 456, 1060 450 C 990 450, 918 450, 820 450"
                fill="none"
                stroke="#9e1b32"
                stroke-width="9"
                stroke-linecap="round"
                stroke-dasharray="0 1600"
                opacity="0"
              />

              <g id="search-group">
                <circle id="search-ring" cx="520" cy="300" r="58" fill="none" stroke="#b5b5b5" stroke-width="5" opacity="0" />
                <rect
                  id="search-diamond"
                  x="604"
                  y="364"
                  width="112"
                  height="112"
                  fill="none"
                  stroke="#b5b5b5"
                  stroke-width="5"
                  transform="rotate(45 660 420)"
                  opacity="0"
                />
                <g id="search-panel" opacity="0">
                  <rect id="search-panel-rect" x="456" y="548" width="212" height="120" fill="#ffffff" stroke="#b5b5b5" stroke-width="5" />
                  <path id="search-panel-accent" d="M 498 590 H 600" stroke="#9c9c9c" stroke-width="7" stroke-linecap="round" />
                  <path id="search-panel-detail" d="M 498 626 H 570" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                </g>
                <circle id="search-echo-top" cx="520" cy="300" r="9" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-mid" cx="660" cy="420" r="9" fill="#9e1b32" opacity="0" />
                <circle id="search-echo-bottom" cx="560" cy="612" r="9" fill="#9e1b32" opacity="0" />
                <path id="search-arc-top" d="M 430 450 C 462 430, 488 372, 520 300" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-mid" d="M 520 300 C 582 330, 624 370, 660 420" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
                <path id="search-arc-bottom" d="M 660 420 C 626 500, 596 548, 560 612" fill="none" stroke="#cfcfcf" stroke-width="3" stroke-dasharray="8 12" opacity="0" />
              </g>

              <g id="tension-group" opacity="0">
                <rect id="shutter-top" x="742" y="216" width="266" height="156" fill="#333e48" opacity="0.16" />
                <rect id="shutter-bottom" x="742" y="568" width="266" height="156" fill="#333e48" opacity="0.16" />
                <rect id="gate-frame" x="804" y="300" width="108" height="340" fill="none" stroke="#9c9c9c" stroke-width="3" opacity="0.44" />
                <path id="gate-track" d="M 676 470 H 1048" fill="none" stroke="#cfcfcf" stroke-width="4" stroke-linecap="round" opacity="0.62" />
                <circle id="pressure-ring" cx="860" cy="470" r="32" fill="none" stroke="#ffccd5" stroke-width="5" opacity="0.26" />
              </g>

              <g id="transform-rig">
                <g id="future-group" opacity="0">
                  <circle id="future-hub" cx="1060" cy="450" r="34" fill="none" stroke="#9c9c9c" stroke-width="3" />
                  <rect id="slot-a" x="980" y="238" width="160" height="104" fill="none" stroke="#b5b5b5" stroke-width="3" />
                  <rect id="slot-b" x="1138" y="376" width="164" height="104" fill="none" stroke="#b5b5b5" stroke-width="3" />
                  <rect id="slot-c" x="979" y="570" width="162" height="104" fill="none" stroke="#b5b5b5" stroke-width="3" />
                </g>

                <g id="transform-group" opacity="0">
                  <circle id="transform-ring" cx="1060" cy="450" r="84" fill="none" stroke="#9e1b32" stroke-width="9" opacity="0" />
                  <circle id="transform-ring-secondary" cx="1060" cy="450" r="126" fill="none" stroke="#ffccd5" stroke-width="5" opacity="0" />
                  <path id="connector-a" d="M 1060 450 L 1060 290" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" opacity="0" />
                  <path id="connector-b" d="M 1060 450 L 1220 428" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" opacity="0" />
                  <path id="connector-c" d="M 1060 450 L 1060 622" fill="none" stroke="#4f4f4f" stroke-width="5" stroke-linecap="round" opacity="0" />

                  <g id="card-a" opacity="0">
                    <rect x="980" y="238" width="160" height="104" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                    <path id="card-a-accent" d="M 1020 274 H 1096" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                    <path id="card-a-detail" d="M 1020 306 H 1078" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  </g>
                  <g id="card-b" opacity="0">
                    <rect x="1138" y="376" width="164" height="104" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                    <path id="card-b-accent" d="M 1180 412 H 1260" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                    <path id="card-b-detail" d="M 1180 444 H 1242" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  </g>
                  <g id="card-c" opacity="0">
                    <rect x="979" y="570" width="162" height="104" fill="#ffffff" stroke="#4f4f4f" stroke-width="5" />
                    <path id="card-c-accent" d="M 1019 606 H 1099" stroke="#9e1b32" stroke-width="7" stroke-linecap="round" />
                    <path id="card-c-detail" d="M 1019 638 H 1077" stroke="#cfcfcf" stroke-width="5" stroke-linecap="round" />
                  </g>
                </g>
              </g>

              <g id="resolution-group" opacity="0">
                <circle id="resolution-aura" cx="820" cy="450" r="150" fill="none" stroke="#ffccd5" stroke-width="4" opacity="0" />
                <circle id="resolution-core-ring" cx="820" cy="450" r="74" fill="none" stroke="#9e1b32" stroke-width="3" opacity="0" />
              </g>

              <circle id="dot-halo" cx="360" cy="450" r="76" fill="url(#halo-gradient)" opacity="0" />
              <circle id="dot-core" cx="360" cy="450" r="18" fill="#9e1b32" opacity="0" />
            </g>
          </svg>

          <div class="sr-only" aria-live="polite" aria-atomic="true">
            <p id="phase-label">appearance</p>
          </div>
          <p class="sr-only" id="keyboard-help">
            Press Space to pause or resume the narrative. Press R to restart it.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
